<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0b0f1a"/>
<title>CeasAI Outreach</title>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0b0f1a; --panel:#141a2b; --panel2:#1b2338; --line:#26304a;
  --txt:#eef2fb; --mut:#93a0bd; --accent:#5b8cff; --accent2:#7c4dff;
  --good:#2fd07a; --warn:#ffb020; --bad:#ff5d6c; --chip:#233054;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--accent)}
button{font-family:inherit}
.hide{display:none!important}
.mut{color:var(--mut)}
.center{text-align:center}
input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  border-radius:12px;padding:12px 13px;font-size:15px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:130px;line-height:1.5}
label{display:block;font-size:12.5px;color:var(--mut);margin:0 0 6px 2px;font-weight:600;letter-spacing:.02em}
.field{margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;
  padding:13px 16px;font-size:15px;font-weight:700;cursor:pointer;background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
.btn.good{background:var(--good);border:none;color:#06231a}
.btn.ghost{background:transparent}
.btn.block{width:100%}
.btn.lg{padding:16px;font-size:16.5px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--chip);border:1px solid var(--line);
  color:var(--txt);border-radius:999px;padding:8px 13px;font-size:13.5px;cursor:pointer;font-weight:600}
.chip.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
.wrap{max-width:760px;margin:0 auto;padding:16px 15px 96px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
.h1{font-size:20px;font-weight:800;margin:2px 0 3px}
.sub{color:var(--mut);font-size:13.5px;margin:0 0 14px}
.row{display:flex;gap:10px}.row>*{flex:1}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.metric{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:18px;padding:16px 12px;text-align:center}
.metric .n{font-size:34px;font-weight:900;line-height:1;letter-spacing:-.02em}
.metric .l{font-size:11.5px;color:var(--mut);margin-top:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.metric.em .n{color:var(--accent)} .metric.ig .n{color:var(--accent2)} .metric.rp .n{color:var(--good)}
.bar{height:10px;background:var(--panel2);border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.brk{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13.5px}
.brk .nm{width:120px;flex:none;color:var(--mut);font-weight:600}
.brk .ct{width:38px;flex:none;text-align:right;font-weight:800}
.brk .bw{flex:1}
.lead{border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:9px;background:var(--panel2)}
.lead .nm{font-weight:800;font-size:15px}
.lead .meta{color:var(--mut);font-size:12.5px;margin-top:3px}
.tag{display:inline-block;background:var(--chip);border-radius:8px;padding:2px 8px;font-size:11px;color:var(--mut);margin:4px 4px 0 0}
.tag.em{color:var(--good)} .tag.ig{color:var(--accent2)}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#000d;color:#fff;
  padding:11px 16px;border-radius:12px;font-size:14px;z-index:99;max-width:90vw;text-align:center;border:1px solid var(--line)}
.toast.err{background:#3a0d14;border-color:var(--bad)} .toast.ok{background:#0b2c1f;border-color:var(--good)}
.nav{position:fixed;left:0;right:0;bottom:0;background:#0c1120ee;backdrop-filter:blur(10px);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);z-index:50}
.nav button{background:none;border:none;color:var(--mut);padding:9px 2px 12px;font-size:10.5px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav button .ic{font-size:19px}
.nav button.on{color:var(--accent)}
.top{display:flex;align-items:center;gap:10px;max-width:760px;margin:0 auto;padding:14px 15px 4px}
.top .brand{font-weight:900;font-size:16px;letter-spacing:.02em}
.top .brand span{color:var(--accent)}
.banner{border-radius:12px;padding:11px 13px;font-size:13px;margin-bottom:12px;border:1px solid}
.banner.warn{background:#2a220a;border-color:var(--warn);color:#ffd98a}
.banner.ok{background:#0b2c1f;border-color:var(--good);color:#9df3c8}
.banner.info{background:#101a33;border-color:var(--accent);color:#bcd0ff}
.big{font-size:42px;font-weight:900}
.qbox{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px;white-space:pre-wrap;
  font-size:15px;line-height:1.55}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border:none}
.stepper{display:flex;align-items:center;gap:14px;justify-content:center}
.stepper button{width:44px;height:44px;border-radius:12px;font-size:22px}
.modal{position:fixed;inset:0;background:#000a;display:flex;align-items:flex-end;justify-content:center;z-index:90}
.modal .sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:18px;
  width:100%;max-width:760px;max-height:90vh;overflow:auto}
@media(min-width:640px){.modal{align-items:center}.modal .sheet{border-radius:20px}}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #fff5;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style></head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth" class="hide">
  <div class="wrap" style="max-width:400px;padding-top:12vh">
    <div class="center" style="margin-bottom:18px">
      <div class="brand" style="font-size:26px;font-weight:900">Ceas<span style="color:var(--accent)">AI</span></div>
      <div class="mut" style="margin-top:6px">Outreach — sign in</div>
    </div>
    <div class="card">
      <form onsubmit="return doAuth(event)">
        <div class="field"><label>Email</label><input id="a-email" type="email" autocomplete="username" required/></div>
        <div class="field"><label>Password</label><input id="a-pass" type="password" autocomplete="current-password" required/></div>
        <div id="auth-msg"></div>
        <button id="a-submit" class="btn primary block lg" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hide">
  <div class="top">
    <div class="brand">Ceas<span>AI</span> Outreach</div>
    <button class="btn ghost" style="margin-left:auto;padding:8px 12px" onclick="signOut()" title="Sign out">⏻</button>
  </div>
  <div id="view" class="wrap"></div>
  <div class="nav" id="nav"></div>
</div>
<script>
/* ============ CONFIG ============ */
const SUPABASE_URL = "https://dxctcajmleurhwhbnqyj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable__u2lblfYFekZgYJknH3PtQ_J20vGVF9";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BIZ_TYPES = ["Gym","CrossFit","MMA / Boxing","Yoga / Pilates","Personal Training","Boutique Studio","Wellness / Spa","Other"];
// Template B — "quick question" single-question email. {{title}} = business name
// (the send-campaign edge fn merges c.title), {{city}} = the lead's city.
const TEMPLATE_B = {
  subject: "quick question about {{title}}",
  body: `Hi there,

Quick question — is {{title}} currently doing anything to automatically follow up with new leads and website inquiries?

I build simple AI tools for {{city}} fitness & wellness businesses that capture every inquiry and reply (and book them) in seconds — so you stop losing prospects to slow follow-up.

Worth a quick look?`
};

/* ============ STATE ============ */
const state = {
  user:null, profile:null, org:null,
  view:"dashboard",
  contacts:[],
  metrics:{emails:0, dms:0, responses:0, inbound:0},
  segment:{type:"", state:"", hasEmail:false, warm:false},
  dm:{queue:[], idx:0, text:"", _sig:""},
};

/* ============ HELPERS ============ */
const $  = (s,r=document)=>r.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(m,cls=""){let t=document.createElement("div");t.className="toast "+cls;t.textContent=m;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
function toastErr(e){toast((e&&e.message)||String(e),"err");}
function num(n){return (n||0).toLocaleString();}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function lsKey(k){return "ceasai_"+k+"_"+(state.user?state.user.id:"anon");}
function igClean(v){return String(v||"").trim().replace(/^@+/,"").replace(/^https?:\/\/(www\.)?instagram\.com\//i,"").replace(/[/?#].*$/,"");}
// Structured fields are encoded as prefixed tags so NO schema change is needed:
//   biz:<Type>  st:<ST>  ig:<handle>   (business name lives in contacts.title)
function tagVal(c,pre){const t=(c.tags||[]).find(x=>String(x).indexOf(pre)===0);return t?t.slice(pre.length):"";}
function bizType(c){return tagVal(c,"biz:")||"Other";}
function stOf(c){return (tagVal(c,"st:")||"").toUpperCase();}
function igOf(c){return igClean(tagVal(c,"ig:")||c.instagram||"");}
function dispName(c){return c.title||((c.first_name||"")+" "+(c.last_name||"")).trim()||"—";}
function isInbound(c){return String(c&&c.source||"").indexOf("IG keyword")===0;}
function hasEmail(c){return !!(c.email&&c.email.includes("@"));}
function tplGet(){try{const v=JSON.parse(localStorage.getItem(lsKey("tplB")));if(v&&v.subject)return v;}catch(e){}return {...TEMPLATE_B};}
function tplSet(o){try{localStorage.setItem(lsKey("tplB"),JSON.stringify(o));}catch(e){}}
function respGet(){try{return parseInt(localStorage.getItem(lsKey("responses")))||0;}catch(e){return 0;}}
function respSet(n){try{localStorage.setItem(lsKey("responses"),String(Math.max(0,n)));}catch(e){}}

/* ============ AUTH ============ */
async function doAuth(ev){
  ev.preventDefault();
  const email=$("#a-email").value.trim(), pass=$("#a-pass").value;
  const btn=$("#a-submit");btn.disabled=true;const o=btn.textContent;btn.textContent="Please wait…";
  const msg=$("#auth-msg");msg.innerHTML="";
  try{
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    await boot();
  }catch(e){
    msg.innerHTML='<div class="banner warn">'+esc(e.message||"Sign-in failed")+'</div>';
    btn.disabled=false;btn.textContent=o;
  }
  return false;
}
async function signOut(){await sb.auth.signOut();location.reload();}
sb.auth.onAuthStateChange((e)=>{if(e==="SIGNED_OUT")location.reload();});

/* ============ BOOT / DATA ============ */
async function boot(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user){$("#auth").classList.remove("hide");$("#app").classList.add("hide");return;}
  state.user=user;
  let {data:prof}=await sb.from("profiles").select("*").eq("id",user.id).maybeSingle();
  if(!prof){await new Promise(r=>setTimeout(r,900));({data:prof}=await sb.from("profiles").select("*").eq("id",user.id).maybeSingle());}
  state.profile=prof||{email:user.email,org_id:null};
  if(state.profile.org_id){
    const {data:org}=await sb.from("orgs").select("*").eq("id",state.profile.org_id).maybeSingle();
    state.org=org;
  }
  $("#auth").classList.add("hide");$("#app").classList.remove("hide");
  await loadAll();
  navigate(state.view);
}
async function loadAll(){
  // PostgREST caps each response (~1000 rows), so page through with range().
  let all=[], from=0; const page=1000;
  for(let guard=0; guard<40; guard++){
    const {data,error}=await sb.from("contacts").select("*").order("updated_at",{ascending:false}).range(from,from+page-1);
    if(error){toastErr(error);break;}
    all=all.concat(data||[]);
    if(!data||data.length<page)break;
    from+=page;
  }
  state.contacts=all;
  state.metrics.inbound=all.filter(isInbound).length;
  await loadMetrics();
}
async function loadMetrics(){
  try{
    const em=await sb.from("email_events").select("id",{count:"exact",head:true}).eq("channel","email").eq("status","sent");
    const dm=await sb.from("email_events").select("id",{count:"exact",head:true}).eq("channel","instagram_dm").eq("status","sent");
    state.metrics.emails=em.count||0;
    state.metrics.dms=dm.count||0;
  }catch(e){}
  state.metrics.responses=respGet();
}

/* ============ NAV ============ */
const TABS=[
  {id:"dashboard",ic:"📊",label:"Dashboard"},
  {id:"leads",ic:"🎯",label:"Leads"},
  {id:"email",ic:"✉️",label:"Email"},
  {id:"dm",ic:"📷",label:"IG DM"},
  {id:"settings",ic:"⚙️",label:"Settings"},
];
function navigate(v){state.view=v;renderNav();render();window.scrollTo(0,0);}
function renderNav(){
  $("#nav").innerHTML=TABS.map(t=>`<button class="${state.view===t.id?'on':''}" onclick="navigate('${t.id}')">
    <span class="ic">${t.ic}</span>${t.label}</button>`).join("");
}
function render(){
  const v=$("#view");
  if(state.view==="dashboard")v.innerHTML=viewDashboard();
  else if(state.view==="leads")v.innerHTML=viewLeads();
  else if(state.view==="email")v.innerHTML=viewEmail();
  else if(state.view==="dm")v.innerHTML=viewDM();
  else if(state.view==="settings")v.innerHTML=viewSettings();
}

/* ============ SEGMENT ============ */
function segFilter(list){
  const s=state.segment;
  return list.filter(c=>{
    if(s.type && bizType(c)!==s.type)return false;
    if(s.state && stOf(c)!==s.state.toUpperCase())return false;
    if(s.hasEmail && !hasEmail(c))return false;
    if(s.warm && !isInbound(c))return false;
    return true;
  });
}
function emailable(list){return list.filter(c=>hasEmail(c)&&!c.unsubscribed&&c.email_status!=="bounced"&&c.email_status!=="invalid");}
function withIG(list){return list.filter(c=>igOf(c));}
function segLabel(){
  const s=state.segment;const p=[];
  if(s.warm)p.push("Warm inbound"); p.push(s.type||"All types");
  if(s.state)p.push(s.state.toUpperCase()); if(s.hasEmail)p.push("has email");
  return p.join(" · ");
}
function statesList(){return [...new Set(state.contacts.map(stOf).filter(Boolean))].sort();}
function setSeg(k,v){state.segment[k]=v;render();}
function toggleSeg(k){state.segment[k]=!state.segment[k];render();}
function viewWarm(){state.segment={type:"",state:"",hasEmail:false,warm:true};navigate("leads");}

/* ============ DASHBOARD ============ */
function viewDashboard(){
  const m=state.metrics;
  const total=state.contacts.length;
  const byType={};BIZ_TYPES.forEach(t=>byType[t]=0);
  let emCount=0;
  state.contacts.forEach(c=>{const t=bizType(c);byType[t]=(byType[t]||0)+1;if(hasEmail(c))emCount++;});
  const maxT=Math.max(1,...Object.values(byType));
  const brk=BIZ_TYPES.filter(t=>byType[t]>0).map(t=>`
    <div class="brk"><div class="nm">${esc(t)}</div>
      <div class="bw"><div class="bar"><i style="width:${Math.round(byType[t]/maxT*100)}%"></i></div></div>
      <div class="ct">${byType[t]}</div></div>`).join("")||`<div class="mut">No leads yet — import on the Leads tab.</div>`;
  return `
  <div class="h1">Dashboard</div>
  <div class="sub">Your outreach at a glance</div>
  <div class="metrics">
    <div class="metric ig"><div class="n">${num(m.dms)}</div><div class="l">IG DMs sent</div>${m.inbound?`<div style="font-size:11px;color:var(--good);font-weight:800;margin-top:5px">+${num(m.inbound)} inbound</div>`:""}</div>
    <div class="metric em"><div class="n">${num(m.emails)}</div><div class="l">Emails sent</div></div>
    <div class="metric rp"><div class="n">${num(m.responses)}</div><div class="l">Responses</div></div>
  </div>
  ${m.inbound?`<div class="card" style="margin-top:14px;border-color:var(--good)">
    <div class="row" style="align-items:center">
      <div><div style="font-weight:800">🔥 ${num(m.inbound)} warm inbound lead${m.inbound===1?"":"s"}</div>
        <div class="mut" style="font-size:12.5px">From Instagram keyword replies (ManyChat) — higher priority than cold.</div></div>
      <div style="flex:none"><button class="btn good" onclick="viewWarm()">View →</button></div>
    </div></div>`:""}
  <div class="card" style="margin-top:14px">
    <div class="row" style="align-items:center">
      <div><div class="big" style="color:var(--txt)">${num(total)}</div><div class="mut" style="font-weight:700">Total leads &nbsp;·&nbsp; ${num(emCount)} emailable</div></div>
      <div style="flex:none"><button class="btn" onclick="navigate('leads')">Build segment →</button></div>
    </div>
  </div>
  <div class="card">
    <div style="font-weight:800;margin-bottom:10px">Leads by business type</div>
    ${brk}
  </div>
  <div class="card">
    <div class="row" style="align-items:center">
      <div><div style="font-weight:800">Responses received</div><div class="mut" style="font-size:12.5px">Check replies in the ceasai.pro Gmail inbox, then log the count here.</div></div>
      <div class="stepper" style="flex:none">
        <button class="btn" onclick="bumpResponses(-1)">–</button>
        <div class="big" style="min-width:56px;text-align:center;color:var(--good)">${num(m.responses)}</div>
        <button class="btn" onclick="bumpResponses(1)">+</button>
      </div>
    </div>
  </div>`;
}
function bumpResponses(d){const n=Math.max(0,respGet()+d);respSet(n);state.metrics.responses=n;render();}

/* ============ LEADS / SEGMENTS ============ */
function viewLeads(){
  const imported=state.contacts.some(c=>c.source==="mindbody");
  const seg=segFilter(state.contacts);
  const em=emailable(seg);const ig=withIG(seg);
  const typeChips=["",...BIZ_TYPES].map(t=>`<span class="chip ${state.segment.type===t?'on':''}" onclick="setSeg('type',this.dataset.t)" data-t="${esc(t)}">${t?esc(t):"All types"}</span>`).join(" ");
  const stateOpts=`<option value="">All states</option>`+statesList().map(s=>`<option value="${s}" ${state.segment.state===s?'selected':''}>${s}</option>`).join("");
  const preview=seg.slice(0,40).map(c=>leadCard(c)).join("")||`<div class="mut">No leads match this segment.</div>`;
  return `
  <div class="h1">Leads &amp; Segments</div>
  <div class="sub">Pick a business type to build a target segment</div>
  ${imported?"":`<div class="banner info">No leads imported yet. Tap below to load the 1,791 Mindbody businesses.</div>
     <button class="btn primary block lg" style="margin-bottom:14px" onclick="importLeads(this)">⬇ Import Mindbody leads (1,791)</button>`}
  <div class="card">
    <label>Business type</label>
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px">${typeChips}</div>
    <div class="row">
      <div class="field" style="margin:0"><label>State</label><select onchange="setSeg('state',this.value)">${stateOpts}</select></div>
      <div class="field" style="margin:0;max-width:150px"><label>&nbsp;</label>
        <button class="btn ${state.segment.hasEmail?'primary':''} block" onclick="toggleSeg('hasEmail')">${state.segment.hasEmail?'✓ Has email':'Has email'}</button></div>
    </div>
    <button class="btn ${state.segment.warm?'good':''} block" style="margin-top:10px" onclick="toggleSeg('warm')">${state.segment.warm?'✓ Warm inbound only':'🔥 Warm inbound only'}</button>
  </div>
  <div class="card">
    <div class="row" style="align-items:center;margin-bottom:12px">
      <div><div style="font-weight:900;font-size:26px">${num(seg.length)}</div><div class="mut" style="font-weight:700">in segment · ${num(em.length)} emailable · ${num(ig.length)} on IG</div></div>
    </div>
    <div class="row">
      <button class="btn primary" onclick="navigate('email')">✉️ Email segment</button>
      <button class="btn" style="background:linear-gradient(135deg,var(--accent2),#b06dff);border:none;color:#fff" onclick="navigate('dm')">📷 DM segment</button>
    </div>
  </div>
  <div class="card">
    <div style="font-weight:800;margin-bottom:10px">Preview <span class="mut" style="font-weight:600">(first 40)</span></div>
    ${preview}
  </div>`;
}
function leadCard(c){
  const tags=[];
  if(isInbound(c))tags.push('<span class="tag" style="color:var(--good)">🔥 warm inbound</span>');
  if(hasEmail(c))tags.push('<span class="tag em">✉ email</span>');
  const ig=igOf(c);if(ig)tags.push('<span class="tag ig">📷 @'+esc(ig)+'</span>');
  tags.push('<span class="tag">'+esc(bizType(c))+'</span>');
  return `<div class="lead">
    <div class="nm">${esc(dispName(c))}</div>
    <div class="meta">${esc([c.city,stOf(c)].filter(Boolean).join(", "))||"—"}</div>
    <div>${tags.join("")}</div>
  </div>`;
}

async function importLeads(btn){
  if(!state.org){toast("Org not ready","err");return;}
  if(state.contacts.some(c=>c.source==="mindbody")){toast("Already imported","ok");return;}
  btn.disabled=true;const o=btn.innerHTML;btn.innerHTML='<span class="spin"></span> Importing…';
  try{
    const res=await fetch("leads-seed.json",{cache:"no-store"});
    const seed=await res.json();
    const org_id=state.org.id;let done=0;
    for(let i=0;i<seed.length;i+=200){
      const batch=seed.slice(i,i+200).map(s=>{
        const tags=["biz:"+(s.business_type||"Other")];
        if(s.state)tags.push("st:"+String(s.state).toUpperCase());
        if(s.instagram)tags.push("ig:"+igClean(s.instagram));
        return {
          org_id, first_name:"", last_name:"",
          title:s.company||null, email:s.email||null, city:s.city||null,
          tags, source:"mindbody", status:"New",
          notes:s.website?("web: "+s.website):null
        };
      });
      const {error}=await sb.from("contacts").insert(batch);
      if(error)throw error;
      done+=batch.length;btn.innerHTML='<span class="spin"></span> '+done+" / "+seed.length;
    }
    toast("Imported "+done+" leads","ok");
    await loadAll();render();
  }catch(e){toastErr(e);btn.disabled=false;btn.innerHTML=o;}
}

/* ============ EMAIL — ONE CLICK ============ */
function viewEmail(){
  const tpl=tplGet();
  const seg=segFilter(state.contacts);
  const send=emailable(seg);
  const org=state.org||{};
  const ready=!!org.mailing_address && !!org.from_email;
  const sample=send[0]||seg[0]||null;
  return `
  <div class="h1">Mass Email</div>
  <div class="sub">Template B · sends through your Gmail SMTP engine</div>
  <div class="card">
    <div class="mut" style="font-weight:700;margin-bottom:6px">Segment</div>
    <div style="font-weight:800;font-size:15px">${esc(segLabel())}</div>
    <div style="margin-top:10px;display:flex;align-items:baseline;gap:8px">
      <div class="big" style="color:var(--accent)">${num(send.length)}</div>
      <div class="mut" style="font-weight:700">will receive this email</div>
    </div>
    <div class="mut" style="font-size:12.5px;margin-top:4px">of ${num(seg.length)} in segment · suppressed &amp; no-email leads are skipped automatically</div>
    <button class="btn ghost block" style="margin-top:10px" onclick="navigate('leads')">Change segment →</button>
  </div>
  ${ready?"":`<div class="banner warn">⚠ Set your From email + mailing address in <b>Settings</b> before sending (legally required).</div>`}
  <div class="card">
    <div class="field"><label>Subject</label><input id="e-subj" value="${esc(tpl.subject)}" oninput="saveTpl()"/></div>
    <div class="field" style="margin-bottom:6px"><label>Body — {{title}} (business name) &amp; {{city}} auto-fill per lead</label>
      <textarea id="e-body" oninput="saveTpl()">${esc(tpl.body)}</textarea></div>
    <div class="mut" style="font-size:12px">A footer with your name, address and an unsubscribe link is added automatically to every email.</div>
    <button class="btn ghost" style="margin-top:8px" onclick="resetTpl()">↺ Reset to Template B</button>
  </div>
  ${sample?`<div class="card">
    <div style="font-weight:800;margin-bottom:8px">Preview <span class="mut" style="font-weight:600">— ${esc(dispName(sample))}</span></div>
    <div class="qbox"><b>${esc(mergeMail(tpl.subject,sample))}</b>\n\n${esc(mergeMail(tpl.body,sample))}</div>
  </div>`:""}
  <button class="btn primary block lg" ${send.length&&ready?"":"disabled"} onclick="confirmSend()">
    🚀 Send to all ${num(send.length)}
  </button>
  <div class="mut center" style="font-size:12px;margin-top:8px">Paced sending · ${num(org.daily_cap||100)}/day cap · one email per business</div>`;
}
function mergeMail(t,c){
  const map={title:dispName(c),business:dispName(c),company:dispName(c),
    city:c.city||"your area",first_name:c.first_name||"there",first:c.first_name||"there"};
  return String(t||"").replace(/\{\{?\s*(\w+)\s*\}?\}/g,(m,k)=>map[k]!=null?map[k]:m);
}
function saveTpl(){tplSet({subject:$("#e-subj").value,body:$("#e-body").value});}
function resetTpl(){tplSet({...TEMPLATE_B});render();}
function confirmSend(){
  const send=emailable(segFilter(state.contacts));
  if(!send.length)return;
  const sheet=`<div class="modal" onclick="if(event.target===this)this.remove()"><div class="sheet">
    <div class="h1">Send to ${num(send.length)} businesses?</div>
    <div class="sub">${esc(segLabel())} · through your Gmail SMTP engine</div>
    <div class="banner info">Emails are personalized, paced, capped at ${num((state.org&&state.org.daily_cap)||100)}/day, and every send is logged. Unsubscribed leads are skipped.</div>
    <button class="btn primary block lg" onclick="doSend(this)">Yes — send now</button>
    <button class="btn ghost block" style="margin-top:8px" onclick="this.closest('.modal').remove()">Cancel</button>
  </div></div>`;
  document.body.insertAdjacentHTML("beforeend",sheet);
}
async function doSend(btn){
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Sending…';
  const tpl=tplGet();
  const send=emailable(segFilter(state.contacts));
  const ids=send.map(c=>c.id);
  try{
    let campId=null;
    try{
      const {data:camp}=await sb.from("campaigns").insert({
        org_id:state.org.id, name:"Mass email — "+segLabel(), subject:tpl.subject, body:tpl.body,
        status:"queued", total:ids.length, daily_cap:(state.org.daily_cap||100)
      }).select().maybeSingle();
      campId=camp?camp.id:null;
    }catch(e){}
    const {data,error}=await sb.functions.invoke("send-campaign",{body:{
      campaign_id:campId, contact_ids:ids, subject:tpl.subject, body:tpl.body
    }});
    if(error)throw error;
    const modal=btn.closest(".modal");if(modal)modal.remove();
    if(data&&data.ok){
      toast("Sent "+num(data.sent||0)+(data.capped_over_daily_limit?" · "+data.capped_over_daily_limit+" held for tomorrow":""),"ok");
    }else if(data&&data.reason==="no_provider"){toast("SMTP not configured in Supabase secrets","err");}
    else if(data&&data.reason==="no_address"){toast("Add a mailing address in Settings first","err");navigate("settings");return;}
    else if(data&&data.reason==="smtp_connect_failed"){toast("SMTP unreachable — check secrets/port 465","err");}
    else{toast((data&&data.message)||"Send did not complete","err");}
    await loadMetrics();navigate("dashboard");
  }catch(e){toastErr(e);btn.disabled=false;btn.innerHTML="Yes — send now";}
}

/* ============ IG DM CENTER ============ */
const DM_GREET=["Hey {first}!","Hi {first} —","{first}, hope you're doing well!","Hey {first} — hope you're good!","Hey there!","Hi! 👋"];
const DM_OPEN=["love what you're doing at {biz}.","been checking out {biz} — really great stuff.","came across {biz} and had to reach out.","{biz} caught my eye — impressed with what you're building.","found {biz} while looking at {type}s in {city}."];
const DM_VALUE=["I build simple AI tools for {type}s that capture every lead and follow up (and book them) automatically.","We help {type}s like yours stop losing leads — one simple app that replies + books clients in seconds.","I make one little app that handles the follow-up + booking for {type}s so you can focus on the work.","custom AI that answers new leads in seconds so none slip through the cracks."];
const DM_CTA=["Cool if I send a quick example?","Open to a 2-min look?","Want me to show what it could do for {biz}?","Mind if I share a quick example?","Worth a quick look? no pressure."];
function typeWord(t){return ({"Gym":"gym","CrossFit":"CrossFit box","MMA / Boxing":"gym","Yoga / Pilates":"studio","Personal Training":"training studio","Boutique Studio":"studio","Wellness / Spa":"wellness business","Other":"business"})[t]||"business";}
function genDM(c){
  const ctx={first:(c.first_name||"there"),biz:dispName(c)==="—"?"your studio":dispName(c),city:c.city||"your area",type:typeWord(bizType(c))};
  return [pick(DM_GREET),pick(DM_OPEN),pick(DM_VALUE),pick(DM_CTA)]
    .map(p=>String(p).replace(/\{(\w+)\}/g,(m,k)=>ctx[k]!=null?ctx[k]:m)).join(" ").replace(/\s{2,}/g," ").trim();
}
function viewDM(){
  const seg=withIG(segFilter(state.contacts));
  const sig=segLabel();
  if(state.dm._sig!==sig){state.dm.queue=seg.map(c=>c.id);state.dm.idx=0;state.dm._sig=sig;state.dm.text="";}
  const q=state.dm.queue;
  return `
  <div class="h1">Instagram DM Center</div>
  <div class="sub">Ban-safe one-tap queue · ${esc(sig)}</div>
  <div class="banner warn">Instagram has <b>no official API for cold/mass DMs</b> — automation risks a ban. This queue is the safe, effective way: it writes a personalized DM for each lead, you tap to copy &amp; open Instagram, send, and log it.</div>
  <div class="card">
    <div class="row" style="align-items:center">
      <div><div style="font-weight:900;font-size:26px">${num(q.length)}</div><div class="mut" style="font-weight:700">leads with Instagram in this segment</div></div>
      <div style="flex:none" class="center"><div class="big" style="color:var(--accent2)">${num(state.dm.idx)}</div><div class="mut" style="font-size:11px;font-weight:700">done</div></div>
    </div>
    ${q.length?"":`<div class="banner info" style="margin:12px 0 0">No leads with an Instagram handle in this segment. Adjust the segment on the Leads tab.</div>`}
    <button class="btn ghost block" style="margin-top:12px" onclick="navigate('leads')">Change segment →</button>
  </div>
  ${renderDMCard()}`;
}
function renderDMCard(){
  const q=state.dm.queue;
  if(state.dm.idx>=q.length){
    if(!q.length)return "";
    return `<div class="card center"><div style="font-size:40px">✅</div><div style="font-weight:800;margin-top:6px">Queue complete</div>
      <div class="mut">Logged ${num(q.length)} DMs. Nice work.</div>
      <button class="btn block" style="margin-top:12px" onclick="state.dm.idx=0;state.dm.text='';render()">↺ Restart queue</button></div>`;
  }
  const c=state.contacts.find(x=>x.id===q[state.dm.idx]);
  if(!c)return "";
  if(!state.dm.text)state.dm.text=genDM(c);
  const handle=igOf(c);
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div><div style="font-weight:800">${esc(dispName(c))}</div>
        <div class="mut" style="font-size:12.5px">@${esc(handle)} · ${esc(bizType(c))} · ${esc([c.city,stOf(c)].filter(Boolean).join(", "))}</div></div>
      <div class="mut" style="font-weight:800">${state.dm.idx+1}/${q.length}</div>
    </div>
    <div class="qbox" id="dm-text">${esc(state.dm.text)}</div>
    <div class="row" style="margin-top:10px">
      <button class="btn" onclick="state.dm.text=genDM(state.contacts.find(x=>x.id==='${c.id}'));render()">🔀 Rewrite</button>
      <button class="btn primary" onclick="copyOpenIG('${esc(handle)}')">📋 Copy &amp; open IG</button>
    </div>
    <div class="row" style="margin-top:9px">
      <button class="btn ghost" onclick="dmSkip()">Skip</button>
      <button class="btn good" onclick="dmSent(this,'${c.id}')">✓ Mark sent</button>
    </div>
  </div>`;
}
async function copyOpenIG(handle){
  try{await navigator.clipboard.writeText(state.dm.text);toast("DM copied","ok");}catch(e){}
  window.open("https://ig.me/m/"+handle,"_blank");
}
function dmSkip(){state.dm.idx++;state.dm.text="";render();}
async function dmSent(btn,id){
  btn.disabled=true;
  try{
    const c=state.contacts.find(x=>x.id===id);
    const now=new Date().toISOString();
    const {error}=await sb.from("email_events").insert({
      org_id:state.org.id, contact_id:id, channel:"instagram_dm", status:"sent",
      provider:"instagram", subject:"IG DM", to_email:null, sent_at:now,
      completed_by:state.user.email, personalization:{business:c&&dispName(c),text:state.dm.text}
    });
    if(error)throw error;
    await sb.from("contacts").update({last_contacted_at:now}).eq("id",id);
    state.metrics.dms++;state.dm.idx++;state.dm.text="";
    toast("Logged IG DM","ok");render();
  }catch(e){toastErr(e);btn.disabled=false;}
}

/* ============ SETTINGS ============ */
function viewSettings(){
  const o=state.org||{};
  return `
  <div class="h1">Settings</div>
  <div class="sub">Sending identity &amp; compliance</div>
  <div class="card">
    <div class="field"><label>From name</label><input id="s-fromname" value="${esc(o.from_name||"CeasAI")}"/></div>
    <div class="field"><label>From email (your Gmail SMTP sender)</label><input id="s-fromemail" value="${esc(o.from_email||"ceasai.pro@gmail.com")}"/></div>
    <div class="field"><label>Reply-to (optional)</label><input id="s-replyto" value="${esc(o.reply_to||"")}"/></div>
    <div class="field"><label>Mailing address (required by law on every email)</label><input id="s-addr" value="${esc(o.mailing_address||"CeasAI — Metro Atlanta, GA 30092")}"/></div>
    <div class="field"><label>Daily send cap</label><input id="s-cap" type="number" value="${esc(o.daily_cap||100)}"/></div>
    <button class="btn primary block" onclick="saveSettings(this)">Save settings</button>
  </div>
  <div class="card">
    <div style="font-weight:800;margin-bottom:6px">Email engine</div>
    <div class="mut" style="font-size:13px">Sends run through the Supabase <b>send-campaign</b> edge function using Gmail SMTP. Credentials live only as Supabase secrets — never in this app. The footer + unsubscribe link are appended automatically for CAN-SPAM compliance.</div>
  </div>
  <div class="card">
    <div style="font-weight:800;margin-bottom:6px">Data</div>
    <div class="mut" style="font-size:13px;margin-bottom:10px">${num(state.contacts.length)} leads loaded · ${num(state.contacts.filter(c=>c.source==="mindbody").length)} from Mindbody · ${num(state.metrics.inbound)} warm inbound.</div>
    <button class="btn block" onclick="navigate('leads')">Manage leads &amp; segments →</button>
  </div>
  <button class="btn ghost block" style="border-color:var(--bad);color:var(--bad)" onclick="signOut()">Sign out</button>`;
}
async function saveSettings(btn){
  btn.disabled=true;const o=btn.textContent;btn.textContent="Saving…";
  const patch={
    from_name:$("#s-fromname").value.trim()||null,
    from_email:$("#s-fromemail").value.trim()||null,
    reply_to:$("#s-replyto").value.trim()||null,
    mailing_address:$("#s-addr").value.trim()||null,
    daily_cap:parseInt($("#s-cap").value)||100,
    email_provider:"smtp"
  };
  const {error}=await sb.from("orgs").update(patch).eq("id",state.org.id);
  if(error){toastErr(error);btn.disabled=false;btn.textContent=o;return;}
  Object.assign(state.org,patch);toast("Saved","ok");btn.disabled=false;btn.textContent=o;
}

/* ============ START ============ */
boot();
</script>
