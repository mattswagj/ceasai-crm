<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<title>CeasAI CRM</title>
<!-- v3.0: analytics dashboard + lead pipeline + follow-up flow + bulk email (Resend) + Hunter enrichment + mobile-first -->
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230e0f13'/%3E%3Ctext x='32' y='44' font-size='34' font-family='Georgia' font-weight='bold' text-anchor='middle' fill='%23d4af37'%3EC%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0e0f13; --panel:#151821; --panel2:#1b1f2a; --panel3:#222735;
  --border:#2a2f3d; --border2:#353b4c;
  --text:#e8eaf0; --muted:#9aa2b1; --muted2:#6b7280;
  --gold:#d4af37; --gold2:#f2d98a; --goldsoft:rgba(212,175,55,.14);
  --red:#e5484d; --green:#30a46c; --blue:#3b82f6; --purple:#8b5cf6; --amber:#f5a524; --cyan:#22b8cf;
  --radius:12px; --radius2:16px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  font-synthesis:none;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(1200px 600px at 80% -10%,rgba(212,175,55,.06),transparent 60%),var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
}
a{color:var(--gold2);text-decoration:none}
button{font-family:inherit}
.hidden{display:none!important}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#2a2f3d;border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;justify-content:center;border:1px solid var(--border2);
  background:var(--panel2);color:var(--text);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
.btn:hover{border-color:#454b5e;background:var(--panel3)}
.btn.primary{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#1a1200;border:none}
.btn.primary:hover{filter:brightness(1.06)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--text);background:var(--panel2)}
.btn.danger{color:#ff8b8f;border-color:#5a2b2d;background:#2a1618}
.btn.danger:hover{background:#3a1c1e}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn.icon{padding:7px;width:34px;height:34px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.02em;border:1px solid var(--border2);background:var(--panel2)}

/* ---------- Inputs ---------- */
input,select,textarea{width:100%;background:var(--panel);border:1px solid var(--border2);color:var(--text);
  padding:9px 11px;border-radius:9px;font-size:13px;outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--goldsoft)}
textarea{resize:vertical;min-height:70px}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600}
.field{margin-bottom:13px}
.row{display:flex;gap:12px}
.row>*{flex:1}

/* ---------- Auth ---------- */
#auth{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius2);
  padding:30px 28px;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:4px}
.logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#1a1d26,#0b0d12);
  display:grid;place-items:center;font-family:Georgia,serif;font-weight:700;color:var(--gold);font-size:22px;border:1px solid var(--border2)}
.brand h1{font-size:19px;margin:0;letter-spacing:.02em}
.brand .sub{color:var(--muted);font-size:12px}
.auth-tabs{display:flex;gap:6px;margin:22px 0 18px;background:var(--panel2);padding:4px;border-radius:11px}
.auth-tabs button{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);border-radius:8px;cursor:pointer;font-weight:600;font-size:13px}
.auth-tabs button.active{background:var(--panel3);color:var(--text)}
.msg{font-size:12.5px;padding:9px 11px;border-radius:9px;margin-top:12px}
.msg.err{background:#2a1618;color:#ff9296;border:1px solid #5a2b2d}
.msg.ok{background:#12261c;color:#57d99a;border:1px solid #1f5138}

/* ---------- App shell ---------- */
#app{display:none;min-height:100dvh}
.shell{display:grid;grid-template-columns:236px 1fr;min-height:100dvh}
.sidebar{background:linear-gradient(180deg,#12141b,#0e0f13);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100dvh}
.side-brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px}
.side-brand .logo{width:34px;height:34px;font-size:18px}
.side-brand h1{font-size:15px;margin:0}
.side-brand .sub{font-size:10.5px;color:var(--muted)}
.nav{padding:8px;flex:1;overflow:auto}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--muted);
  font-weight:600;cursor:pointer;font-size:13.5px;margin-bottom:2px}
.nav a:hover{background:var(--panel2);color:var(--text)}
.nav a.active{background:var(--goldsoft);color:var(--gold2)}
.nav a .ic{width:18px;text-align:center;opacity:.9}
.nav a .badge{margin-left:auto;background:var(--panel3);color:var(--muted);border-radius:999px;font-size:10.5px;padding:1px 7px;font-weight:700}
.nav a.active .badge{background:var(--gold);color:#1a1200}
.side-foot{padding:12px;border-top:1px solid var(--border)}
.user-box{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#1a1200;display:grid;place-items:center;font-weight:800;font-size:12px;flex:none}
.user-box .nm{font-size:12.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-box .em{font-size:10.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:rgba(14,15,19,.82);backdrop-filter:blur(10px);z-index:20}
.topbar h2{margin:0;font-size:18px;font-weight:700}
.topbar .spacer{flex:1}
.search{position:relative;max-width:280px;flex:1}
.search input{padding-left:32px}
.search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted)}
.content{padding:22px;overflow:auto}
.menu-btn{display:none}

/* ---------- Cards / grid ---------- */
.grid{display:grid;gap:14px}
.cards{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.stat{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:var(--radius);padding:16px 17px}
.stat .k{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.stat .v{font-size:27px;font-weight:800;margin-top:7px;letter-spacing:-.01em}
.stat .d{font-size:11.5px;color:var(--muted);margin-top:3px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px 17px}
.panel h3{margin:0 0 13px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.panel h3 .sub{font-weight:500;color:var(--muted);font-size:12px}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
th{ text-align:left;padding:11px 14px;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;
  letter-spacing:.04em;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text)}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:.1s}
tbody tr:hover{background:var(--panel2)}
.cell-main{font-weight:600}
.cell-sub{color:var(--muted);font-size:11.5px}
.muted{color:var(--muted)}
.right{text-align:right}
.center{text-align:center}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar .spacer{flex:1}
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .big{font-size:34px;margin-bottom:8px;opacity:.5}

/* status pills */
.st{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;display:inline-block}
.st-New{background:#1e293b;color:#93b4ff}
.st-Contacted{background:#2a2140;color:#c4b5fd}
.st-Qualified{background:#0f2e29;color:#5eead4}
.st-Customer{background:#12261c;color:#57d99a}
.st-Lost{background:#2a1618;color:#ff9296}
.st-Proposal{background:#2e2410;color:#f5cf72}
.st-Won{background:#12261c;color:#57d99a}
.tag{background:var(--panel3);color:var(--muted);border-radius:6px;padding:1px 7px;font-size:11px;margin:1px 3px 1px 0;display:inline-block}

/* ---------- Kanban ---------- */
.kanban{display:flex;gap:13px;overflow-x:auto;padding-bottom:10px}
.kcol{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);min-width:250px;width:250px;flex:none;display:flex;flex-direction:column;max-height:calc(100dvh - 190px)}
.kcol.drag-over{border-color:var(--gold);box-shadow:0 0 0 2px var(--goldsoft)}
.kcol-h{padding:12px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;top:0}
.kcol-h .dot{width:9px;height:9px;border-radius:50%}
.kcol-h .t{font-weight:700;font-size:13px}
.kcol-h .c{margin-left:auto;color:var(--muted);font-size:11.5px}
.kcol-h .sum{color:var(--gold2);font-size:11px;font-weight:700}
.kbody{padding:10px;overflow:auto;flex:1;display:flex;flex-direction:column;gap:9px}
.kcard{background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:11px;cursor:grab}
.kcard:active{cursor:grabbing}
.kcard.dragging{opacity:.45}
.kcard .kt{font-weight:700;font-size:13px;margin-bottom:5px}
.kcard .kv{color:var(--gold2);font-weight:800;font-size:13px}
.kcard .kmeta{color:var(--muted);font-size:11.5px;margin-top:6px;display:flex;justify-content:space-between;gap:6px}

/* ---------- Modal / drawer ---------- */
#modal-root .overlay{position:fixed;inset:0;background:rgba(4,5,8,.6);backdrop-filter:blur(3px);z-index:100;
  display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius2);width:100%;max-width:520px;
  box-shadow:var(--shadow);animation:pop .16s ease}
.modal.wide{max-width:720px}
@keyframes pop{from{transform:translateY(8px);opacity:.6}to{transform:none;opacity:1}}
.modal-h{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
.modal-h h3{margin:0;font-size:16px}
.modal-h .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px;border-radius:7px}
.modal-h .x:hover{background:var(--panel2);color:var(--text)}
.modal-b{padding:18px}
.modal-f{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.drawer .modal{max-width:560px;margin-left:auto;min-height:calc(100dvh - 0px);border-radius:0;align-self:stretch}
.drawer .overlay{padding:0;justify-content:flex-end;align-items:stretch}

.timeline{list-style:none;padding:0;margin:0}
.timeline li{position:relative;padding:0 0 16px 22px;border-left:2px solid var(--border);margin-left:5px}
.timeline li:last-child{border-color:transparent}
.timeline .tdot{position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--panel3);border:2px solid var(--gold)}
.timeline .th{font-weight:700;font-size:12.5px}
.timeline .tm{color:var(--muted);font-size:11px}
.timeline .tb{font-size:12.5px;margin-top:3px;color:#c9cdd8;white-space:pre-wrap}

.subtabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.subtabs button{background:none;border:none;color:var(--muted);padding:8px 3px;margin-right:14px;cursor:pointer;font-weight:600;font-size:13px;border-bottom:2px solid transparent}
.subtabs button.active{color:var(--gold2);border-color:var(--gold)}

.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--panel3);border:1px solid var(--border2);border-left:3px solid var(--gold);padding:11px 15px;border-radius:10px;
  font-size:13px;box-shadow:var(--shadow);animation:pop .16s ease;max-width:320px}
.toast.err{border-left-color:var(--red)}
.toast.ok{border-left-color:var(--green)}

.dashgrid{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .bl{width:92px;font-size:12px;color:var(--muted);flex:none}
.bar-track{flex:1;background:var(--panel2);border-radius:6px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s}
.bar-row .bn{width:32px;text-align:right;font-weight:700;font-size:12.5px}
.spark{display:flex;align-items:flex-end;gap:4px;height:60px}
/* ---------- ✨ Email generator ---------- */
.eg-chips{display:flex;flex-wrap:wrap;gap:6px}
.eg-chip{padding:6px 12px;border-radius:999px;border:1px solid var(--border2);background:var(--panel2);color:var(--muted);
  cursor:pointer;font-size:12px;font-weight:600;transition:.15s;user-select:none}
.eg-chip:hover{color:var(--text);border-color:#454b5e}
.eg-chip.on{background:var(--goldsoft);border-color:var(--gold);color:var(--gold2)}
.eg-preview{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:2px}
.eg-preview label{margin-top:0}
input.eg-subject{font-weight:700;font-size:14px}
textarea.eg-body{min-height:240px;font-size:13px;line-height:1.55;white-space:pre-wrap}
.eg-meta{font-size:11.5px;color:var(--muted);margin-top:9px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.eg-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
@media(max-width:560px){.eg-actions .btn{flex:1}}

/* new status pills */
.st-Replied{background:#0f2e29;color:#5eead4}
.st-Meeting{background:#10233a;color:#7dd3fc}
.st-Won{background:#12261c;color:#57d99a}
.st-Lost{background:#2a1618;color:#ff9296}

/* funnel */
.funnel{display:flex;flex-direction:column;gap:6px}
.fn-row{display:flex;align-items:center;gap:10px}
.fn-bar{height:30px;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding:0 9px;color:#0b0d12;font-weight:800;font-size:12px;min-width:34px;transition:width .4s}
.fn-lbl{width:88px;flex:none;font-size:12px;color:var(--muted)}
.fn-n{width:34px;text-align:right;font-weight:700;font-size:12.5px}

/* activity sparkline */
.spark{display:flex;align-items:flex-end;gap:3px;height:64px;margin-top:6px}
.spark .sb{flex:1;background:var(--goldsoft);border:1px solid var(--gold);border-bottom:none;border-radius:4px 4px 0 0;min-height:2px;position:relative}
.spark .sb.zero{background:var(--panel2);border-color:var(--border2)}
.spark-x{display:flex;gap:3px;margin-top:4px}
.spark-x span{flex:1;text-align:center;font-size:9px;color:var(--muted2)}

/* selection + campaign */
.selbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;background:var(--panel3);border:1px solid var(--border2);border-radius:10px;padding:9px 12px;margin-bottom:12px;flex-wrap:wrap}
.selbar b{color:var(--gold2)}
.ckbox{width:18px;height:18px;flex:none;cursor:pointer}
.emaildot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.ed-ok{background:var(--green)} .ed-no{background:var(--muted2)} .ed-bad{background:var(--red)} .ed-unsub{background:var(--amber)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid var(--border2);background:var(--panel2)}
.advbtn{border:1px solid var(--border2);background:var(--panel3);color:var(--gold2);border-radius:8px;padding:5px 9px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:8px}
.advbtn:hover{border-color:var(--gold)}
.banner{border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:12px;border:1px solid}
.banner.warn{background:#2e2410;border-color:#5a4a1e;color:#f5cf72}
.banner.info{background:#12233a;border-color:#274b73;color:#8fb4ea}

/* FAB + bottom nav (mobile only) */
.fab{display:none;position:fixed;right:16px;bottom:78px;width:56px;height:56px;border-radius:50%;z-index:50;
  background:linear-gradient(180deg,var(--gold2),var(--gold));color:#1a1200;border:none;font-size:28px;font-weight:400;
  box-shadow:0 8px 22px rgba(0,0,0,.45);cursor:pointer;line-height:1}
.bottomnav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:45;background:rgba(18,20,27,.96);
  backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  grid-template-columns:repeat(5,1fr)}
.bottomnav a{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--muted);font-size:10px;font-weight:600;border-radius:9px;cursor:pointer}
.bottomnav a .bic{font-size:19px;line-height:1}
.bottomnav a.active{color:var(--gold2);background:var(--goldsoft)}

@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:250px;z-index:60;transform:translateX(-105%);transition:.2s;box-shadow:var(--shadow)}
  .sidebar.open{transform:none}
  .menu-btn{display:inline-flex}
  .dashgrid{grid-template-columns:1fr}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;display:none}
  .scrim.show{display:block}
  .search{max-width:none}
  .bottomnav{display:grid}
  .fab{display:flex;align-items:center;justify-content:center}
  .content{padding:16px 14px 96px}
  .topbar{padding:12px 14px}
  #new-btn{display:none}
}
@media(max-width:560px){
  .cards{grid-template-columns:1fr 1fr}
  .stat .v{font-size:22px}
  .stat{padding:13px 13px}
  .btn{padding:10px 14px}
  .btn.sm{padding:7px 11px}
  /* tables -> stacked cards */
  table.cardify{min-width:0}
  table.cardify thead{display:none}
  table.cardify,table.cardify tbody,table.cardify tr,table.cardify td{display:block;width:100%}
  table.cardify tr{border:1px solid var(--border);border-radius:12px;margin-bottom:10px;padding:6px 4px;background:var(--panel)}
  table.cardify td{border:none;padding:6px 12px;display:flex;justify-content:space-between;gap:12px;align-items:center}
  table.cardify td::before{content:attr(data-label);color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;flex:none}
  table.cardify td[data-label=""]::before,table.cardify td.nolabel::before{content:""}
  table.cardify td.right{justify-content:flex-end}
  .table-wrap{border:none;background:transparent;overflow:visible}
  .kcol{min-width:82vw;width:82vw}
  .modal-b{padding:14px}
  .eg-actions .btn{flex:1 1 46%}
}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">
  <div class="auth-card">
    <div class="brand">
      <div class="logo">C</div>
      <div><h1>CeasAI CRM</h1><div class="sub">Contacts · Deals · Outreach</div></div>
    </div>
    <div class="auth-tabs">
      <button id="tab-login" class="active" onclick="setAuthMode('login')">Log in</button>
      <button id="tab-signup" onclick="setAuthMode('signup')">Sign up</button>
    </div>
    <form id="auth-form" onsubmit="return doAuth(event)">
      <div class="field signup-only hidden">
        <label>Your name</label>

function fmtMoney(v){v=Number(v||0);return "$"+v.toLocaleString("en-US",{maximumFractionDigits:0});}
function fmtDate(d){if(!d)return "";const dt=(typeof d==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(d))?new Date(d+"T00:00:00"):new Date(d);if(isNaN(dt))return "";return dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function fmtDateTime(d){if(!d)return "";const dt=new Date(d);return dt.toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});}
function relTime(d){if(!d)return "";const s=(Date.now()-new Date(d))/1000;if(s<60)return "just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";if(s<604800)return Math.floor(s/86400)+"d ago";return fmtDate(d);}

/* ============================================================
   DASHBOARD
============================================================ */
function computeAnalytics(){
  const C=state.data.contacts, D=state.data.deals, T=state.data.tasks, A=state.data.activities, E=state.data.emailEvents;
  const weekAgo=Date.now()-7*86400*1000;
  // per-lead outreach picture
  let contacted=0,replied=0,newWeek=0;
  C.forEach(c=>{
    const s=leadStats(c);
    if(s.contacted)contacted++;
    if(s.hasReply)replied++;
    if(c.created_at&&new Date(c.created_at).getTime()>weekAgo)newWeek++;
  });
  const outAll=A.filter(a=>isOutreachAct(a)&&a.direction!=="inbound");
  const emailsFromActs=outAll.filter(a=>actChannel(a)==="email").length;
  const emailsFromEvents=E.filter(e=>e.status==="sent").length;
  const emailsSent=emailsFromActs+emailsFromEvents;
  const dmsSent=outAll.filter(a=>actChannel(a)==="instagram_dm").length;
  const respRate=contacted?Math.round(replied/contacted*100):0;
  const openDeals=D.filter(d=>d.stage!=="Won"&&d.stage!=="Lost");
  const pipelineVal=openDeals.reduce((s,d)=>s+Number(d.value||0),0);
  const wonDeals=D.filter(d=>d.stage==="Won");
  const wonVal=wonDeals.reduce((s,d)=>s+Number(d.value||0),0);
  const wonLeads=C.filter(c=>c.status==="Won").length;
  const convRate=C.length?Math.round(wonLeads/C.length*100):0;
  const followDueToday=T.filter(t=>!t.done&&t.type==="follow-up"&&t.due_date===todayStr()).length;
  const followOverdue=T.filter(t=>!t.done&&t.type==="follow-up"&&isOverdue(t.due_date)).length;
  const dueToday=T.filter(t=>!t.done&&t.due_date===todayStr()).length;
  const overdue=T.filter(t=>!t.done&&isOverdue(t.due_date)).length;
  const emailable=C.filter(c=>c.email&&!c.unsubscribed&&c.email_status!=="bounced"&&c.email_status!=="invalid").length;
  const unsub=C.filter(c=>c.unsubscribed).length;
  return {C,D,T,A,contacted,replied,newWeek,emailsSent,dmsSent,respRate,openDeals,pipelineVal,wonDeals,wonVal,wonLeads,
    convRate,followDueToday,followOverdue,dueToday,overdue,emailable,unsub};
}
function activitySpark(days){
  // outreach volume per day for the last N days (activities + email_events sent)
  const buckets=[];const now=new Date();now.setHours(0,0,0,0);
  for(let i=days-1;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);buckets.push({d,n:0});}
  const idxFor=ts=>{const t=new Date(ts);t.setHours(0,0,0,0);const diff=Math.round((now-t)/86400000);const i=days-1-diff;return (i>=0&&i<days)?i:-1;};
  state.data.activities.forEach(a=>{if(isOutreachAct(a)&&a.direction!=="inbound"){const i=idxFor(a.occurred_at);if(i>=0)buckets[i].n++;}});
  state.data.emailEvents.forEach(e=>{if(e.status==="sent"&&e.sent_at){const i=idxFor(e.sent_at);if(i>=0)buckets[i].n++;}});
  const max=Math.max(1,...buckets.map(b=>b.n));
  const bars=buckets.map(b=>`<div class="sb ${b.n?"":"zero"}" style="height:${Math.round(b.n/max*100)}%" title="${b.d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}: ${b.n}"></div>`).join("");
  const labels=buckets.map((b,i)=>(i%Math.ceil(days/7)===0)?`<span>${b.d.toLocaleDateString('en-US',{day:'numeric'})}</span>`:`<span></span>`).join("");
  const total=buckets.reduce((s,b)=>s+b.n,0);
  return {html:`<div class="spark">${bars}</div><div class="spark-x">${labels}</div>`,total};
}
function funnel(){
  const C=state.data.contacts;
  const rows=LEAD_STAGES.map(s=>({label:s,value:C.filter(c=>c.status===s).length,color:STATUS_COLORS[s]}));
  const max=Math.max(1,...rows.map(r=>r.value));
  return `<div class="funnel">${rows.map(r=>`<div class="fn-row">
    <div class="fn-lbl">${r.label}</div>
    <div class="fn-bar" style="width:${Math.max(8,r.value/max*100)}%;background:${r.color}">${r.value||""}</div>
    <div class="fn-n">${r.value}</div></div>`).join("")}</div>`;
}
function renderDashboard(v){

    ${stat("Replied",m.replied,"↩",m.respRate+"% response rate")}
    ${stat("Follow-ups due",m.followDueToday+m.followOverdue,"⏰",followTxt)}
  </div>
  <div class="grid cards" style="margin-bottom:16px">
    ${stat("Emails sent",m.emailsSent,"✉","all-time")}
    ${stat("IG DMs sent",m.dmsSent,"📷","all-time")}
    ${stat("Open pipeline",fmtMoney(m.pipelineVal),"⛁",m.openDeals.length+" active deals")}
    ${stat("Conversions",m.wonLeads,"★",m.convRate+"% · "+fmtMoney(m.wonVal)+" won")}
  </div>
  <div class="dashgrid">
    <div class="panel">
      <h3>Outreach activity <span class="sub">· last 14 days · ${sp.total} touches</span></h3>
      ${sp.html}
    </div>
    <div class="panel">
      <h3>Lead pipeline <span class="sub">· ${m.C.length} leads</span></h3>
      ${funnel()}
    </div>
  </div>
  <div class="dashgrid" style="margin-top:14px">

      ${renderTaskMini(m.T.filter(t=>!t.done&&t.type==="follow-up"&&t.due_date&&t.due_date<=todayStr()).slice(0,6),true)}
    </div>
  </div>
  <div class="dashgrid" style="margin-top:14px">
    <div class="panel">
      <h3>Recent activity</h3>
      ${m.A.length?`<ul class="timeline">${m.A.slice(0,8).map(a=>activityItem(a)).join("")}</ul>`:emptyBox("No activity yet","Log an outreach or add a note to a lead.")}
    </div>
    <div class="panel">
      <h3>Email health</h3>
      <div class="grid cards" style="grid-template-columns:1fr 1fr">
        ${stat("Emailable",m.emailable,"✓","valid, not unsubscribed")}
        ${stat("Unsubscribed",m.unsub,"⊘","suppressed")}
      </div>
      <p class="muted" style="font-size:12px;margin:12px 0 0">${m.C.length-m.emailable-m.unsub} leads have no valid email — enrich them from Leads or Campaigns.</p>
    </div>
  </div>`;
}
function stat(k,v,ic,d){return `<div class="stat"><div class="k"><span>${ic}</span>${k}</div><div class="v">${v}</div><div class="d">${d||""}</div></div>`;}
function emptyBox(t,s){return `<div class="empty"><div class="big">◍</div><div style="font-weight:600;color:var(--text)">${esc(t)}</div><div>${esc(s||"")}</div></div>`;}
function barChart(rows,showSum){
  const max=Math.max(1,...rows.map(r=>r.value));
  return rows.map(r=>`<div class="bar-row">
    <div class="bl">${r.label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${r.value/max*100}%;background:${r.color}"></div></div>
    <div class="bn">${r.value}</div>
    ${showSum?`<div class="bn" style="width:64px;color:var(--gold2)">${fmtMoney(r.sum)}</div>`:""}
  </div>`).join("");
}
function donut(rows){
  const total=rows.reduce((s,r)=>s+r.value,0);
  if(!total)return emptyBox("No contacts yet","Add your first contact to see the breakdown.");
  let acc=0;const R=52,C2=2*Math.PI*R;
  const segs=rows.filter(r=>r.value).map(r=>{
    const frac=r.value/total;const dash=frac*C2;const off=acc*C2;acc+=frac;
    return `<circle r="${R}" cx="70" cy="70" fill="none" stroke="${r.color}" stroke-width="18"
      stroke-dasharray="${dash} ${C2-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;
  }).join("");
  return `<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
    <svg width="140" height="140" viewBox="0 0 140 140">${segs}
      <text x="70" y="66" text-anchor="middle" fill="#e8eaf0" font-size="24" font-weight="800">${total}</text>
      <text x="70" y="84" text-anchor="middle" fill="#9aa2b1" font-size="10">leads</text></svg>
    <div style="flex:1;min-width:130px">${rows.map(r=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12.5px">
      <span style="width:10px;height:10px;border-radius:3px;background:${r.color}"></span>
      <span style="flex:1">${r.label}</span><b>${r.value}</b></div>`).join("")}</div></div>`;
}
function activityItem(a){
  const c=byId(state.data.contacts,a.contact_id);
  const icon={email:"✉",call:"☎",text:"💬",meeting:"👥",note:"✎",stage_change:"⇄",dm:"📷",instagram_dm:"📷"}[a.type]||"•";
  return `<li><span class="tdot"></span>
    <div class="th">${icon} ${esc(a.subject||a.type)}${c?` · <a onclick="openContact('${c.id}')">${esc(contactName(c))}</a>`:""}</div>
    <div class="tm">${relTime(a.occurred_at)}${a.direction?" · "+a.direction:""}</div>
    ${a.body?`<div class="tb">${esc(a.body)}</div>`:""}</li>`;
}
function renderTaskMini(tasks,followupMode){

}

============================================================ */
function nextStage(s){const i=LEAD_STAGES.indexOf(s);return (i>=0&&i<LEAD_STAGES.length-1&&s!=="Won"&&s!=="Lost")?LEAD_STAGES[i+1]:null;}
function renderPipeline(v){
  const C=state.data.contacts;
  const toolbar=`<div class="toolbar">
    <span class="muted" style="font-size:12.5px">${C.length} leads · tap a card to open, ▸ to advance stage</span>
    <div class="spacer"></div><button class="btn primary" onclick="editContact()">+ Lead</button></div>`;
  v.innerHTML=toolbar+`<div class="kanban" id="lead-kanban">${LEAD_STAGES.map(stage=>{
    const items=C.filter(c=>c.status===stage);
    return `<div class="kcol" data-lstage="${stage}" ondragover="lDragOver(event,this)" ondragleave="this.classList.remove('drag-over')" ondrop="lDrop(event,'${stage}',this)">
      <div class="kcol-h"><span class="dot" style="background:${STATUS_COLORS[stage]||'#888'}"></span><span class="t">${stage}</span><span class="c">${items.length}</span></div>
      <div class="kbody">${items.map(c=>{
        const s=leadStats(c);const nx=nextStage(stage);
        const em=emailDot(c);
        return `<div class="kcard" draggable="true" data-id="${c.id}" ondragstart="lDragStart(event,'${c.id}')" ondragend="this.classList.remove('dragging')" onclick="openContact('${c.id}')">
          <div class="kt">${em}${esc(contactName(c))}</div>
          <div class="kmeta"><span>${esc(companyName(c.company_id)||c.title||'—')}</span><span>${s.last?relTime(s.last.occurred_at):'<span class="muted">new</span>'}</span></div>
          ${nx?`<button class="advbtn" onclick="event.stopPropagation();advanceLeadStage('${c.id}','${nx}')">Advance to ${nx} ▸</button>`:''}
        </div>`;}).join("")||`<div class="muted" style="font-size:11.5px;text-align:center;padding:12px 0">—</div>`}</div>
    </div>`;}).join("")}</div>`;
}
function emailDot(c){
  if(c.unsubscribed)return `<span class="emaildot ed-unsub" title="Unsubscribed"></span>`;
  if(c.email&&(c.email_status==="bounced"||c.email_status==="invalid"))return `<span class="emaildot ed-bad" title="Bad email"></span>`;
  if(c.email)return `<span class="emaildot ed-ok" title="Emailable"></span>`;
  return `<span class="emaildot ed-no" title="No email"></span>`;
}
let dragLeadId=null;
function lDragStart(e,id){dragLeadId=id;e.dataTransfer.effectAllowed="move";e.target.classList.add("dragging");}
function lDragOver(e,el){e.preventDefault();el.classList.add("drag-over");}
async function lDrop(e,stage,el){e.preventDefault();el.classList.remove("drag-over");const id=dragLeadId;if(!id)return;await advanceLeadStage(id,stage);dragLeadId=null;}
async function advanceLeadStage(id,stage){
  const c=byId(state.data.contacts,id);if(!c||c.status===stage)return;
  const prev=c.status;c.status=stage;if(state.view==="pipeline")renderPipeline($("#view"));
  try{
    const {error}=await sb.from("contacts").update({status:stage,updated_at:new Date().toISOString()}).eq("id",id);if(error)throw error;
    await sb.from("activities").insert(withOrg({contact_id:id,type:"stage_change",subject:`${contactName(c)} → ${stage}`,occurred_at:new Date().toISOString()}));
    toast(`Moved to ${stage}`,"ok");await Promise.all([reload("contacts"),reload("activities")]);renderNavBadges();
    if(state.view==="pipeline")renderPipeline($("#view"));
    else if($("#modal-root").dataset.drawer==="1")renderContactDrawer(id);
  }catch(err){c.status=prev;if(state.view==="pipeline")renderPipeline($("#view"));toastErr(err);}
}

function sortVal(o,k){if(k==="company_id")return companyName(o.company_id).toLowerCase();if(k==="last_name")return contactName(o).toLowerCase();const val=o[k];return typeof val==="string"?val.toLowerCase():(val||"");}

/* ----- CSV ----- */
function exportCSV(){
  const cols=["first_name","last_name","email","phone","instagram","company","title","status","source","tags","notes"];
  const rows=state.data.contacts.map(c=>[c.first_name,c.last_name,c.email,c.phone,c.instagram,companyName(c.company_id),c.title,c.status,c.source,(c.tags||[]).join("; "),c.notes]);
  const csv=[cols.join(","),...rows.map(r=>r.map(csvCell).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="contacts-"+todayStr()+".csv";a.click();
  toast("Exported "+rows.length+" contacts","ok");
}
function csvCell(v){v=v==null?"":String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function importCSV(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".csv,text/csv";
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>previewImport(parseCSV(r.result));r.readAsText(f);};
  inp.click();
}
function parseCSV(text){
  const rows=[];let i=0,field="",row=[],inQ=false;
  text=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  while(i<text.length){const ch=text[i];
    if(inQ){if(ch==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=ch;}
    else{if(ch==='"')inQ=true;else if(ch===",")row.push(field),field="";else if(ch==="\n"){row.push(field);rows.push(row);row=[];field="";}else field+=ch;}
    i++;}
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(c=>c.trim()!==""));
}
function previewImport(rows){
  if(!rows.length)return toast("Empty file","err");
  const header=rows[0].map(h=>h.trim().toLowerCase());
  const idx=n=>header.findIndex(h=>h===n||h.replace(/[_\s]/g,"")===n.replace(/[_\s]/g,""));
  const map={first:idx("first name")>=0?idx("first name"):idx("first_name"),
    last:idx("last name")>=0?idx("last name"):idx("last_name"),
    name:idx("name"),email:idx("email"),phone:idx("phone"),company:idx("company"),
    title:idx("title"),status:idx("status"),source:idx("source"),tags:idx("tags"),notes:idx("notes"),instagram:idx("instagram")};
  const body=rows.slice(1);
  const parsed=body.map(r=>{
    let fn=map.first>=0?r[map.first]:"",ln=map.last>=0?r[map.last]:"";
    if((!fn&&!ln)&&map.name>=0){const p=(r[map.name]||"").trim().split(/\s+/);fn=p.shift()||"";ln=p.join(" ");}
    return {first_name:(fn||"").trim(),last_name:(ln||"").trim(),
      email:g(r,map.email),phone:g(r,map.phone),instagram:g(r,map.instagram),
      title:g(r,map.title),status:CONTACT_STATUSES.includes((g(r,map.status)||"").trim())?g(r,map.status).trim():"New",
      source:g(r,map.source)||"CSV import",
      tags:(g(r,map.tags)||"").split(/[;,]/).map(s=>s.trim()).filter(Boolean),
      notes:g(r,map.notes),_company:g(r,map.company)};
  }).filter(c=>c.first_name||c.last_name||c.email);
  openModal("Import contacts",`<p class="muted" style="margin-top:0">Found <b style="color:var(--text)">${parsed.length}</b> contacts to import. Preview:</p>
    <div class="table-wrap" style="max-height:280px;overflow:auto"><table><thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Status</th></tr></thead>
    <tbody>${parsed.slice(0,50).map(c=>`<tr><td>${esc((c.first_name+" "+c.last_name).trim())}</td><td>${esc(c.email||"")}</td><td>${esc(c._company||"")}</td><td>${esc(c.status)}</td></tr>`).join("")}</tbody></table></div>`,
    [{label:"Cancel",cls:"ghost",act:closeModal},{label:`Import ${parsed.length}`,cls:"primary",act:()=>runImport(parsed)}]);
  function g(r,i){return i>=0?(r[i]||""):"";}
}
async function runImport(parsed){
  try{
    // ensure companies exist
    const compMap={};state.data.companies.forEach(c=>compMap[c.name.toLowerCase()]=c.id);
    const newComps=[...new Set(parsed.map(p=>p._company).filter(Boolean).filter(n=>!compMap[n.toLowerCase()]))];
    if(newComps.length){
      const {data,error}=await sb.from("companies").insert(newComps.map(n=>withOrg({name:n}))).select();
      if(error)throw error;(data||[]).forEach(c=>compMap[c.name.toLowerCase()]=c.id);
    }
    const payload=parsed.map(p=>withOrg({first_name:p.first_name,last_name:p.last_name,email:p.email||null,
      phone:p.phone||null,instagram:p.instagram||null,title:p.title||null,status:p.status,source:p.source||null,tags:p.tags,notes:p.notes||null,
      company_id:p._company?compMap[p._company.toLowerCase()]:null,updated_at:new Date().toISOString()}));
    const {error}=await sb.from("contacts").insert(payload);if(error)throw error;
    toast("Imported "+payload.length+" contacts","ok");closeModal();
    await Promise.all([reload("contacts"),reload("companies")]);render();
  }catch(e){toastErr(e);}
}

/* ---------- Outreach hub helpers ---------- */
const OUTREACH_TYPES=["email","call","text","meeting","dm","instagram_dm"];
function isOutreachAct(a){return OUTREACH_TYPES.includes(a.type)||(!!a.channel&&a.channel!=="stage_change");}
function actChannel(a){let ch=a.channel||a.type;if(ch==="dm")ch="instagram_dm";return ch;}
function leadStats(c){
  const acts=state.data.activities.filter(a=>a.contact_id===c.id);
  const out=acts.filter(a=>isOutreachAct(a)&&a.direction!=="inbound");
  const inbound=acts.filter(a=>a.direction==="inbound");
  const channels=[...new Set(out.map(actChannel))];
  const last=out[0]||null; // activities are ordered occurred_at desc from loadAll
  const openTasks=state.data.tasks.filter(t=>t.contact_id===c.id&&!t.done&&t.due_date).sort((a,b)=>a.due_date<b.due_date?-1:1);
  return {out,inbound,channels,last,nextFollow:openTasks[0]||null,hasReply:inbound.length>0,contacted:out.length>0};
}
function channelChip(ch){const lbl=CHANNEL_LABELS[ch]||ch;const ic={email:"✉",instagram_dm:"📷",call:"☎",text:"💬",meeting:"👥"}[ch]||"•";return `<span class="tag">${ic} ${esc(lbl)}</span>`;}

function renderOutreach(v){
  const tab=state.ui.outreachTab||"leads";
  const dueCount=state.data.tasks.filter(t=>!t.done&&t.type==="follow-up"&&t.due_date&&t.due_date<=todayStr()).length;
  const bar=`<div class="subtabs">
    <button class="${tab==="leads"?"active":""}" onclick="state.ui.outreachTab='leads';render()">Work the list</button>
    <button class="${tab==="followups"?"active":""}" onclick="state.ui.outreachTab='followups';render()">Follow-ups${dueCount?` (${dueCount})`:""}</button>
    <button class="${tab==="templates"?"active":""}" onclick="state.ui.outreachTab='templates';render()">Templates</button>
  </div>`;
  if(tab==="templates"){v.innerHTML=bar+renderOutreachTemplates();return;}
  if(tab==="followups"){v.innerHTML=bar+renderFollowupsQueue();return;}

  const o=state.ui.outreach;
  const weekAgo=Date.now()-7*86400*1000;
  const stats=new Map();state.data.contacts.forEach(c=>stats.set(c.id,leadStats(c)));
  let contactedWeek=0,replies=0,notContacted=0;
  state.data.contacts.forEach(c=>{const s=stats.get(c.id);
    if(s.out.some(a=>new Date(a.occurred_at).getTime()>weekAgo))contactedWeek++;
    if(s.hasReply)replies++;
    if(!s.contacted)notContacted++;});
  const dueToday=state.data.tasks.filter(t=>!t.done&&t.due_date===todayStr()).length;

  let list=state.data.contacts.slice();
  if(o.status)list=list.filter(c=>c.status===o.status);
  if(o.channel)list=list.filter(c=>{const s=stats.get(c.id);
    if(o.channel==="none")return !s.contacted;
    return s.channels.includes(o.channel);});
  if(o.quick==="notcontacted")list=list.filter(c=>!stats.get(c.id).contacted);
  else if(o.quick==="overdue")list=list.filter(c=>{const f=stats.get(c.id).nextFollow;return !!f&&isOverdue(f.due_date);});
  else if(o.quick==="needs")list=list.filter(c=>{const f=stats.get(c.id).nextFollow;return !!f&&f.due_date<=todayStr();});

  function prio(c){const s=stats.get(c.id),f=s.nextFollow;
    if(f&&isOverdue(f.due_date))return 0;
    if(f&&f.due_date===todayStr())return 1;
    if(!s.contacted)return 2;
    return 3;}
  list.sort((a,b)=>{const pa=prio(a),pb=prio(b);if(pa!==pb)return pa-pb;
    const sa=stats.get(a.id),sb=stats.get(b.id);
    return (sa.last?new Date(sa.last.occurred_at).getTime():0)-(sb.last?new Date(sb.last.occurred_at).getTime():0);});
  state._outreachList=list.map(c=>c.id);

  const metrics=`<div class="grid cards" style="margin-bottom:16px">
    ${stat("Contacted this week",contactedWeek,"✉","last 7 days")}
    ${stat("Replies",replies,"↩",replies?"leads replied":"none yet")}
    ${stat("Follow-ups due today",dueToday,"⏰",dueToday?'<span style="color:var(--amber)">action needed</span>':"all clear")}
    ${stat("Not yet contacted",notContacted,"○","fresh leads")}
  </div>`;

  const quicks={all:"All",needs:"Needs follow-up",overdue:"Overdue",notcontacted:"Not contacted"};
  const toolbar=`<div class="toolbar">
    ${Object.keys(quicks).map(k=>`<button class="btn sm ${o.quick===k?"primary":""}" onclick="state.ui.outreach.quick='${k}';render()">${quicks[k]}</button>`).join("")}
    <select style="max-width:160px" onchange="state.ui.outreach.channel=this.value;render()">
      <option value="">All channels</option>
      <option value="email" ${o.channel==="email"?"selected":""}>✉ Email used</option>
      <option value="instagram_dm" ${o.channel==="instagram_dm"?"selected":""}>📷 Instagram DM used</option>
      <option value="none" ${o.channel==="none"?"selected":""}>None yet</option>
    </select>
    <select style="max-width:150px" onchange="state.ui.outreach.status=this.value;render()">
      <option value="">All statuses</option>
      ${CONTACT_STATUSES.map(st=>`<option ${o.status===st?"selected":""}>${st}</option>`).join("")}
    </select>
    <div class="spacer"></div>
    <span class="muted" style="font-size:12.5px">${list.length} lead${list.length===1?"":"s"}</span>
    <button class="btn primary" onclick="workList()" ${list.length?"":"disabled"}>▶ Work the list</button>
  </div>`;

  const rows=list.map(c=>{
    const s=stats.get(c.id),f=s.nextFollow,od=f&&isOverdue(f.due_date);
    const lastTxt=s.last?`${relTime(s.last.occurred_at)} · ${CHANNEL_LABELS[actChannel(s.last)]||actChannel(s.last)}`:'<span class="muted">never</span>';
    const chans=s.channels.length?s.channels.map(channelChip).join(""):'<span class="muted">—</span>';
    const follow=f
      ?`<span style="${od?'color:var(--red);font-weight:700':''}">${fmtDate(f.due_date)}${od?' ⚠ overdue':''}</span>`
      :(s.contacted?'<span class="muted">—</span>':'<span class="chip" style="color:var(--gold2);border-color:var(--gold)">new lead</span>');
    return `<tr onclick="workLead('${c.id}')">
      <td data-label="Lead"><div class="cell-main">${emailDot(c)}${esc(contactName(c))}</div><div class="cell-sub">${esc(companyName(c.company_id)||c.title||"")}</div></td>
      <td data-label="Channels">${chans}</td>
      <td data-label="Last" class="cell-sub">${lastTxt}</td>
      <td data-label="Stage"><span class="st st-${c.status}">${c.status}</span></td>
      <td data-label="Next">${follow}</td>
      <td data-label="" class="right"><button class="btn primary sm" onclick="event.stopPropagation();workLead('${c.id}')">✨ Work</button></td>
    </tr>`;}).join("");

  v.innerHTML=bar+metrics+toolbar+(list.length?`<div class="table-wrap"><table class="cardify">
    <thead><tr><th>Lead</th><th>Channels used</th><th>Last outreach</th><th>Stage</th><th>Next follow-up</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>`:emptyBox("No leads match","Try clearing filters, or add contacts to start working the list."));
}
function renderFollowupsQueue(){
  const due=state.data.tasks.filter(t=>!t.done&&t.type==="follow-up"&&t.due_date)
    .sort((a,b)=>a.due_date<b.due_date?-1:1);
  const overdue=due.filter(t=>isOverdue(t.due_date));
  const today=due.filter(t=>t.due_date===todayStr());
  const upcoming=due.filter(t=>t.due_date>todayStr());
  const metrics=`<div class="grid cards" style="margin-bottom:14px">
    ${stat("Overdue",overdue.length,"⚠",overdue.length?'<span style="color:var(--red)">work these first</span>':"none")}
    ${stat("Due today",today.length,"⏰",today.length?"ready to send":"clear")}
    ${stat("Upcoming",upcoming.length,"📅","scheduled ahead")}
  </div>`;
  function group(title,arr){
    if(!arr.length)return "";
    return `<div class="panel" style="margin-bottom:14px"><h3>${title} <span class="sub">· ${arr.length}</span></h3>
      <table class="cardify"><tbody>${arr.map(t=>{const c=byId(state.data.contacts,t.contact_id);
        const od=isOverdue(t.due_date);
        return `<tr>
          <td data-label="Lead" onclick="${c?`openContact('${c.id}')`:''}"><div class="cell-main">${c?emailDot(c)+esc(contactName(c)):esc(t.title)}</div>
            <div class="cell-sub">${c?esc(companyName(c.company_id)||c.title||''):''}</div></td>
          <td data-label="Due" class="${od?'':'cell-sub'}" style="${od?'color:var(--red);font-weight:700':''}">${fmtDate(t.due_date)}${od?' ⚠':''}</td>
          <td data-label="" class="right">
            ${c?`<button class="btn primary sm" onclick="event.stopPropagation();sendFollowup('${c.id}','${t.id}')">Send</button> `:""}
            <button class="btn ghost sm" onclick="event.stopPropagation();toggleTask('${t.id}')">Done</button></td>
        </tr>`;}).join("")}</tbody></table></div>`;
  }
  const content=due.length?group("Overdue",overdue)+group("Due today",today)+group("Upcoming",upcoming)
    :emptyBox("No follow-ups scheduled","Send outreach from Work the list or a lead to auto-schedule follow-ups.");
  return metrics+content;

function providerReady(){return !!(state.org&&state.org.email_provider==="resend"&&state.org.from_email&&state.org.mailing_address);}
function allTags(){const s=new Set();state.data.contacts.forEach(c=>(c.tags||[]).forEach(t=>t&&s.add(t)));return [...s].sort();}
function campaignBase(f){
  let list=state.data.contacts.slice();
  if(f.stage)list=list.filter(c=>c.status===f.stage);
  if(f.tag)list=list.filter(c=>(c.tags||[]).includes(f.tag));
  const q=(f.search||"").toLowerCase();
  if(q)list=list.filter(c=>(contactName(c)+" "+(c.email||"")+" "+companyName(c.company_id)).toLowerCase().includes(q));
  return list;
}
function campaignEligible(f){
  const base=campaignBase(f);
  const eligible=base.filter(c=>c.email&&!c.unsubscribed&&c.email_status!=="bounced"&&c.email_status!=="invalid");
  return {base,eligible,
    noEmail:base.filter(c=>!c.email).length,
    unsub:base.filter(c=>c.email&&c.unsubscribed).length,
    bad:base.filter(c=>c.email&&!c.unsubscribed&&(c.email_status==="bounced"||c.email_status==="invalid")).length};
}
function mergeClient(tpl,c){
  const map={first_name:c.first_name||"there",first:c.first_name||"there",last_name:c.last_name||"",
    name:contactName(c),company:companyName(c.company_id)||"your business",title:c.title||"",email:c.email||""};
  return String(tpl||"").replace(/\{\{?\s*(\w+)\s*\}?\}/g,(m,k)=>map[k]!=null?map[k]:m);
}

async function campaignSend(){
  const el=campaignEligible(state.ui.campaign), ids=el.eligible.map(c=>c.id);
  if(!ids.length){toast("No recipients","err");return;}
  const ready=providerReady();
  document.querySelectorAll(".modal-f .btn").forEach(b=>b.disabled=true);
  try{
    const {data:camp,error:ce}=await sb.from("campaigns").insert(withOrg({
      name:cmpDraft.name||"Campaign",subject:cmpDraft.subject,body:cmpDraft.body,
      template_id:cmpDraft.templateId||null,total:ids.length,
      status:ready?"queued":"draft",daily_cap:(state.org&&state.org.daily_cap)||100})).select().single();
    if(ce)throw ce;
    if(!ready){
      const rows=ids.map(id=>{const c=byId(state.data.contacts,id);
        return withOrg({campaign_id:camp.id,contact_id:id,to_email:c.email,subject:mergeClient(cmpDraft.subject,c),status:"queued",provider:null});});
      await sb.from("email_events").insert(rows);
      toast("Campaign queued ("+ids.length+"). Connect Resend to send.","ok");
      closeModal();await Promise.all([reload("campaigns"),reload("emailEvents")]);renderNavBadges();render();return;
    }
    toast("Sending "+ids.length+"… keep this open","ok");
    const {data,error}=await sb.functions.invoke("send-campaign",{body:{campaign_id:camp.id,contact_ids:ids,subject:cmpDraft.subject,body:cmpDraft.body,template_id:cmpDraft.templateId||null}});
    if(error)throw error;
    if(data&&data.reason==="no_provider")toast("Provider key not set server-side — saved as queued","err");
    else if(data&&data.reason==="no_address")toast("Add a mailing address in Settings first","err");
    else if(data&&data.ok)toast(`Sent ${data.sent} · failed ${data.failed} · ${data.skipped_suppressed} suppressed`,"ok");
    else toast((data&&data.message)||"Send failed","err");
    closeModal();await Promise.all([reload("campaigns"),reload("emailEvents"),reload("contacts")]);renderNavBadges();render();
  }catch(e){toastErr(e);document.querySelectorAll(".modal-f .btn").forEach(b=>b.disabled=false);}
}
/* ---- Hunter.io enrichment ---- */
async function enrichLeads(ids){
  if(!ids||!ids.length)return;
  toast("Finding email"+(ids.length>1?"s":"")+" for "+ids.length+" lead"+(ids.length>1?"s":"")+"…");
  try{
    const {data,error}=await sb.functions.invoke("enrich-lead",{body:{contact_ids:ids}});
    if(error)throw error;
    if(data&&data.reason==="no_provider"){toast("Hunter not connected — deploy enrich-lead + set HUNTER_API_KEY","err");return;}
    if(!data||!data.ok){toast((data&&data.message)||"Enrichment failed","err");return;}
    const found=(data.results||[]).filter(r=>r.status==="found").length;
    await reload("contacts");
    let q="";if(data.quota&&data.quota.searches_available!=null)q=` · ${Math.max(0,data.quota.searches_available-(data.quota.searches_used||0))} searches left`;
    toast(`Found ${found}/${ids.length} email${found===1?"":"s"}${q}`,found?"ok":"err");
    if($("#modal-root").dataset.drawer==="1"&&ids.length===1)renderContactDrawer(ids[0]);else render();
  }catch(e){toastErr(e);}
}
function enrichMissing(){
  const cands=state.data.contacts.filter(c=>!c.email&&c.company_id&&!c.unsubscribed).map(c=>c.id);
  if(!cands.length){toast("No leads with a company are missing an email","err");return;}
  const n=Math.min(cands.length,25);
  if(!confirm(`Find emails for ${n} lead${n===1?"":"s"} via Hunter?\nThis uses ~${n} Hunter search credit${n===1?"":"s"} (results are cached per domain).`))return;
  enrichLeads(cands.slice(0,n));
}

    cta:["Want to hop on and walk through it?","Take a peek and lmk your thoughts?","Any questions before we start?","Should we pick a time?"]

let egState={};
function egPick(a){return a[Math.floor(Math.random()*a.length)];}
function egPickBut(a,prev){if(!a||!a.length)return "";if(a.length<2)return a[0];let x;let n=0;do{x=egPick(a);n++;}while(x===prev&&n<12);return x;}
function egMerge(str,ctx){return String(str).replace(/\{(\w+)\}/g,(m,k)=>ctx[k]!=null?ctx[k]:"")
  .replace(/ {2,}/g," ").replace(/ ,/g,",").replace(/ \./g,".").replace(/ —,/g," —").trim();}
function egSettings(){
  const key="ceasai_email_settings_"+(state.user?state.user.id:"anon");let saved={};
  try{saved=JSON.parse(localStorage.getItem(key)||"{}");}catch(e){}
  return {
    name: saved.name || (state.profile&&state.profile.full_name) || (state.user?state.user.email:"") || "",
    company: saved.company || (state.org?state.org.name:"") || "",
    title: saved.title || "",
    signature: saved.signature || ""
  };
}
function egSaveSettings(o){
  const key="ceasai_email_settings_"+(state.user?state.user.id:"anon");
  try{localStorage.setItem(key,JSON.stringify(o));return true;}catch(e){toastErr(e);return false;}
}
function egContext(c){
  const s=egSettings();
  const acts=state.data.activities.filter(a=>a.contact_id===c.id);
  const last=acts[0];
  let lastTouch="my last note",sinceLast="";
  if(last){const t=last.type==="email"?"email":last.type==="call"?"call":last.type==="meeting"?"conversation":last.type==="dm"||last.type==="instagram_dm"?"DM":(last.type||"note");
    lastTouch="my last "+t+" "+relTime(last.occurred_at);sinceLast=" — our last "+t+" was "+relTime(last.occurred_at);}
  const co=byId(state.data.companies,c.company_id);
  const ind=egIndustryProfile((co&&co.industry)||(c.tags||[]).join(" ")||(c.title||""));
  return {
    first:(c.first_name||"there"),
    company:companyName(c.company_id)||"your business",
    myname:s.name||"the CeasAI team",
    mycompany:s.company||"CeasAI",
    mytitle:s.title||"",
    myig:"@ceas_ai",
    source:c.source||"",
    bizType:ind.biz,
    win:ind.win,
    industryHook:ind.hook,
    benefit:egPick(EG_BENEFITS),
    lastTouch,sinceLast
  };
}
function egGenerate(){
  if(egState.channel==="instagram_dm")return egGenerateDM();
  const c=byId(state.data.contacts,egState.contactId);if(!c)return;
  const ctx=egContext(c);
  const P=EG_PURPOSE[egState.purpose]||EG_PURPOSE["Intro"];
  const T=EG_TONE[egState.tone]||EG_TONE["Friendly"];
  const L=egState.last||{};
  const greet=egMerge(egPickBut(T.greet,L.greet),ctx);
  const open=egMerge(egPickBut(P.open,L.open),ctx);
  const value=egMerge(egPickBut(P.value,L.value),ctx);
  const cta=egMerge(egPickBut(P.cta,L.cta),ctx);
  const sign=egPickBut(T.sign,L.sign);
  const subjectRaw=egPickBut(P.subjects,L.subject);
  const subject=egMerge(subjectRaw,ctx);
  egState.last={greet,open,value,cta,sign,subject:subjectRaw};
  const s=egSettings();
  const signName=s.name||ctx.myname;
  const sig=[sign];
  if(s.signature&&s.signature.trim()){
    s.signature.trim().split(/\n/).forEach(l=>sig.push(egMerge(l,{name:signName,company:s.company,title:s.title})));
  }else{
    sig.push(signName);
    const role=[s.title,s.company].filter(Boolean).join(", ");
    if(role)sig.push(role);
  }
  const body=[greet,"",open,"",value,"",cta,"",sig.join("\n")].join("\n");
  egState.subject=subject;egState.body=body;
  return {subject,body};
}
function egGenerateDM(){
  const c=byId(state.data.contacts,egState.contactId);if(!c)return;
  const ctx=egContext(c);
  const D=EG_DM[egState.purpose]||EG_DM["Intro"];
  const L=egState.last||{};
  const greet=egMerge(egPickBut(EG_DM.greet,L.greet),ctx);
  let open=egMerge(egPickBut(D.open,L.open),ctx);
  open=open.charAt(0).toUpperCase()+open.slice(1);
  const value=egMerge(egPickBut(D.value,L.value),ctx);
  const cta=egMerge(egPickBut(D.cta,L.cta),ctx);
  egState.last={greet,open,value,cta};
  // 2–4 short casual sentences, no subject.
  const body=greet+" "+open+" "+value+" "+cta;
  egState.subject="";egState.body=body;
  return {subject:"",body};
}
function openEmailGen(contactId,opts){
  const c=byId(state.data.contacts,contactId);
  if(!c){toast("Contact not found","err");return;}
  const queue=(opts&&opts.queue)||null, qpos=(opts&&opts.pos)||0;
  const purpose=(opts&&opts.purpose)||"Intro", sourceTaskId=(opts&&opts.sourceTaskId)||null;
  // pre-set a sensible channel from what the contact has on file
  let channel=(opts&&opts.channel)||"email";
  if(!opts||!opts.channel){
    if(!c.email&&c.instagram)channel="instagram_dm";
    else if(c.email)channel="email";
    else if(c.instagram)channel="instagram_dm";
  }
  egState={contactId,channel,purpose,tone:"Friendly",last:null,queue,qpos,sourceTaskId};
  egGenerate();
  const title=(queue?`✨ Outreach ${qpos+1}/${queue.length} — `:"✨ Generate outreach — ")+contactName(c);
  openModal(title,`<div id="eg-root">${egModalInner()}</div>`,
    [{label:queue?"Done":"Close",cls:"ghost",act:egCloseGen}],true);
  egSyncPreview();
}
function egCloseGen(){
  const q=egState.queue, id=egState.contactId;
  closeModal();
  if(q)navigate("outreach");
  else openContact(id);
}
function egSkip(){egAdvance();}
function egAdvance(){
  const q=egState.queue;if(!q){egCloseGen();return;}
  const pos=(egState.qpos||0)+1;
  if(pos<q.length){openEmailGen(q[pos],{queue:q,pos});}
  else{closeModal();toast("List complete 🎉 nice work","ok");navigate("outreach");}
}
function egModalInner(){
  const isDM=egState.channel==="instagram_dm";
  return `
  <div class="field" style="margin-bottom:12px"><label>Channel</label>
    <div class="eg-chips" id="eg-channel">
      <span class="eg-chip ${!isDM?"on":""}" onclick="egSetChannel('email')">✉ Email</span>
      <span class="eg-chip ${isDM?"on":""}" onclick="egSetChannel('instagram_dm')">📷 Instagram DM</span>
    </div></div>
  <div class="row" style="gap:16px;flex-wrap:wrap">
    <div class="field" style="margin-bottom:10px"><label>Purpose</label>
      <div class="eg-chips" id="eg-purpose">${EG_PURPOSES.map(p=>`<span class="eg-chip ${p===egState.purpose?"on":""}" onclick="egSet('purpose','${p.replace(/'/g,"\\'")}')">${p}</span>`).join("")}</div></div>
    <div class="field" style="margin-bottom:10px;flex:0 0 auto"><label>Tone</label>
      <div class="eg-chips" id="eg-tone">${EG_TONES.map(t=>`<span class="eg-chip ${t===egState.tone?"on":""}" onclick="egSet('tone','${t}')">${t}</span>`).join("")}</div></div>
  </div>
  <div class="eg-preview">
    ${isDM?"":`<label>Subject</label>
    <input id="eg-subject" class="eg-subject" value="${esc(egState.subject)}"/>`}
    <label ${isDM?"":`style="margin-top:10px"`}>${isDM?"Instagram DM message":"Email body"}</label>
    <textarea id="eg-body" class="eg-body" ${isDM?`style="min-height:150px"`:""}>${esc(egState.body)}</textarea>
    <div class="eg-meta" id="eg-meta"></div>
  </div>
  <div class="eg-actions">
    ${isDM
      ? `<button class="btn primary" onclick="egSendAndLog()">📷 Open IG + log</button>`
      : `<button class="btn primary" onclick="egSendAndLog()">✉ Send + log</button>`}
    <button class="btn" onclick="egRegenerate()">↻ Regenerate</button>
    <button class="btn" onclick="egCopy()">⧉ Copy</button>
    <button class="btn" onclick="egLogOutreach()">✓ Log only</button>
    ${egState.queue?`<button class="btn ghost" onclick="egSkip()">Skip →</button>`:""}
  </div>
  <p class="muted" style="font-size:11px;margin:8px 0 0">${isDM?"":"“Send + log” opens your mail app pre-filled and copies the email, then logs it & schedules the next follow-up."}</p>`;
}
function egRerender(){const r=$("#eg-root");if(r){r.innerHTML=egModalInner();egSyncPreview();}}
function egSet(kind,val){
  egState[kind]=val;egState.last=null;
  egGenerate();egRerender();
}
function egSetChannel(val){
  if(egState.channel===val)return;
  egState.channel=val;egState.last=null;
  egGenerate();egRerender();
}
function egRegenerate(){egGenerate();egSyncPreview();}
function egSyncPreview(){
  const s=$("#eg-subject"),b=$("#eg-body");if(s)s.value=egState.subject;if(b)b.value=egState.body;
  const c=byId(state.data.contacts,egState.contactId),m=$("#eg-meta");
  if(m&&c){const bits=[];if(c.first_name)bits.push(c.first_name);const cn=companyName(c.company_id);if(cn)bits.push(cn);
    if(c.title)bits.push(c.title);if(c.status)bits.push(c.status);if(c.source)bits.push("source: "+c.source);
    if((c.tags||[]).length)bits.push("tags: "+c.tags.join(", "));
    let msg="✨ Personalized with "+(bits.join(" · ")||"contact details");
    if(egState.channel==="instagram_dm"){msg+=c.instagram?" · DM to @"+igHandle(c.instagram):" · ⚠ no Instagram handle on file";}
    m.textContent=msg;}
}
function egCurrent(){return {subject:($("#eg-subject")?$("#eg-subject").value:egState.subject),body:($("#eg-body")?$("#eg-body").value:egState.body)};}
function egCopy(){
  const isDM=egState.channel==="instagram_dm";
  const {subject,body}=egCurrent();
  const text=isDM?body:("Subject: "+subject+"\n\n"+body);
  const done=()=>toast(isDM?"DM copied to clipboard":"Email copied to clipboard","ok");
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>egCopyFallback(text,done));}
  else egCopyFallback(text,done);
}
function egOpenInstagram(){
  const c=byId(state.data.contacts,egState.contactId);
  const h=igHandle(c&&c.instagram);
  if(!h){toast("Add an Instagram handle to this contact first","err");return;}
  window.open("https://instagram.com/"+encodeURIComponent(h),"_blank","noopener");
}
function egCopyFallback(text,done){
  const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");done();}catch(e){toastErr(e);}ta.remove();
}
function egMailto(){
  const c=byId(state.data.contacts,egState.contactId);const {subject,body}=egCurrent();
  if(!c||!c.email){toast("This contact has no email address","err");return;}
  window.location.href="mailto:"+encodeURIComponent(c.email)+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body);
}
function egSendAndLog(){
  const isDM=egState.channel==="instagram_dm";
  if(isDM){egCopy();egOpenInstagram();}
  else{egCopy();egMailto();}
  setTimeout(()=>egLogOutreach(),300);
}
async function egLogOutreach(){
  const c=byId(state.data.contacts,egState.contactId);if(!c)return;
  const isDM=egState.channel==="instagram_dm";
  const {subject,body}=egCurrent();
  const nextFollow=addDays(egState.purpose==="Follow-up"?5:3);
  document.querySelectorAll(".eg-actions .btn").forEach(b=>b.disabled=true);
  try{
    const {error}=await sb.from("activities").insert(withOrg({contact_id:c.id,
      type:isDM?"dm":"email",channel:isDM?"instagram_dm":"email",direction:"outbound",
      subject:isDM?"Instagram DM":(subject||null),body:body||null,occurred_at:new Date().toISOString()}));
    if(error)throw error;
    if(egState.sourceTaskId){await sb.from("tasks").update({done:true,updated_at:new Date().toISOString()}).eq("id",egState.sourceTaskId);}
    await sb.from("tasks").insert(withOrg({title:(egState.purpose==="Follow-up"?"Follow up again: ":"Follow up: ")+contactName(c),type:"follow-up",due_date:nextFollow,contact_id:c.id}));
    const upd={last_contacted_at:new Date().toISOString(),next_followup_at:nextFollow,updated_at:new Date().toISOString()};
    if(c.status==="New")upd.status="Contacted";
    await sb.from("contacts").update(upd).eq("id",c.id);
    toast(isDM?"DM logged ✓ next follow-up set":"Logged ✓ next follow-up scheduled","ok");
    await Promise.all([reload("activities"),reload("tasks"),reload("contacts")]);
    renderNavBadges();
    if(egState.queue){egAdvance();}
    else{openContact(c.id);if(state.view!=="contacts")render();}
  }catch(e){toastErr(e);document.querySelectorAll(".eg-actions .btn").forEach(b=>b.disabled=false);}
}
/* One-tap follow-up: open the generator preset to Follow-up for this lead. */
function sendFollowup(contactId,taskId){
  const c=byId(state.data.contacts,contactId);
  if(!c){toast("Lead not found","err");return;}
  openEmailGen(contactId,{purpose:"Follow-up",sourceTaskId:taskId||null,channel:c.email?"email":(c.instagram?"instagram_dm":"email")});
}

/* ============================================================
   MODAL / DRAWER
============================================================ */
function openModal(title,bodyHTML,actions,wide){
  const acts=(actions||[]).filter(Boolean);
  const root=$("#modal-root");root.dataset.drawer="";
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal ${wide?"wide":""}">
      <div class="modal-h"><h3>${esc(title)}</h3><span class="x" onclick="closeModal()">×</span></div>
      <div class="modal-b">${bodyHTML}</div>
      ${acts.length?`<div class="modal-f">${acts.map((a,i)=>`<button class="btn ${a.cls||""}" data-act="${i}">${esc(a.label)}</button>`).join("")}</div>`:""}
    </div></div>`;
  const first=root.querySelector("input:not([type=checkbox]),textarea,select");if(first)setTimeout(()=>first.focus(),40);
}
function openDrawer(title,bodyHTML){
  const root=$("#modal-root");root.dataset.drawer="1";
  root.innerHTML=`<div class="overlay drawer-ov" onclick="if(event.target===this)closeDrawer()" style="padding:0;justify-content:flex-end;align-items:stretch">
    <div class="modal" style="max-width:560px;border-radius:0;min-height:100dvh;align-self:stretch;display:flex;flex-direction:column">
      <div class="modal-h"><h3>${esc(title)}</h3><span class="x" onclick="closeDrawer()">×</span></div>
      <div class="modal-b" style="overflow:auto">${bodyHTML}</div>
    </div></div>`;
}
function closeModal(){const r=$("#modal-root");if(r.dataset.drawer==="1")return;r.innerHTML="";}
function closeDrawer(){$("#modal-root").innerHTML="";$("#modal-root").dataset.drawer="";}
document.addEventListener("keydown",e=>{if(e.key==="Escape"){if($("#modal-root").dataset.drawer==="1")closeDrawer();else closeModal();}});

/* ============================================================
   START
============================================================ */
sb.auth.onAuthStateChange((event)=>{ if(event==="SIGNED_OUT"){location.reload();} });
setAuthMode("login");
boot();
