<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0b0f1a"/>
<title>CeasAI Outreach</title>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0b0f1a; --panel:#141a2b; --panel2:#1b2338; --line:#26304a;
  --txt:#eef2fb; --mut:#93a0bd; --accent:#5b8cff; --accent2:#7c4dff;
  --good:#2fd07a; --warn:#ffb020; --bad:#ff5d6c; --chip:#233054;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--accent)}
button{font-family:inherit}
.hide{display:none!important}
.mut{color:var(--mut)}
.center{text-align:center}
input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  border-radius:12px;padding:12px 13px;font-size:15px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:130px;line-height:1.5}
label{display:block;font-size:12.5px;color:var(--mut);margin:0 0 6px 2px;font-weight:600;letter-spacing:.02em}
.field{margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;
  padding:13px 16px;font-size:15px;font-weight:700;cursor:pointer;background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
.btn.good{background:var(--good);border:none;color:#06231a}
.btn.ghost{background:transparent}
.btn.block{width:100%}
.btn.lg{padding:16px;font-size:16.5px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--chip);border:1px solid var(--line);
  color:var(--txt);border-radius:999px;padding:8px 13px;font-size:13.5px;cursor:pointer;font-weight:600}
.chip.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
.wrap{max-width:760px;margin:0 auto;padding:16px 15px 96px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
.h1{font-size:20px;font-weight:800;margin:2px 0 3px}
.sub{color:var(--mut);font-size:13.5px;margin:0 0 14px}
.row{display:flex;gap:10px}.row>*{flex:1}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.metric{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:18px;padding:16px 12px;text-align:center}
.metric .n{font-size:34px;font-weight:900;line-height:1;letter-spacing:-.02em}
.metric .l{font-size:11.5px;color:var(--mut);margin-top:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.metric.em .n{color:var(--accent)} .metric.ig .n{color:var(--accent2)} .metric.rp .n{color:var(--good)}
.bar{height:10px;background:var(--panel2);border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.brk{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13.5px}
.brk .nm{width:120px;flex:none;color:var(--mut);font-weight:600}
.brk .ct{width:38px;flex:none;text-align:right;font-weight:800}
.brk .bw{flex:1}
.lead{border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:9px;background:var(--panel2)}
.lead .nm{font-weight:800;font-size:15px}
.lead .meta{color:var(--mut);font-size:12.5px;margin-top:3px}
.tag{display:inline-block;background:var(--chip);border-radius:8px;padding:2px 8px;font-size:11px;color:var(--mut);margin:4px 4px 0 0}
.tag.em{color:var(--good)} .tag.ig{color:var(--accent2)}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#000d;color:#fff;
  padding:11px 16px;border-radius:12px;font-size:14px;z-index:99;max-width:90vw;text-align:center;border:1px solid var(--line)}
.toast.err{background:#3a0d14;border-color:var(--bad)} .toast.ok{background:#0b2c1f;border-color:var(--good)}
.nav{position:fixed;left:0;right:0;bottom:0;background:#0c1120ee;backdrop-filter:blur(10px);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);z-index:50}
.nav button{background:none;border:none;color:var(--mut);padding:9px 2px 12px;font-size:10.5px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav button .ic{font-size:19px}
.nav button.on{color:var(--accent)}
.top{display:flex;align-items:center;gap:10px;max-width:760px;margin:0 auto;padding:14px 15px 4px}
.top .brand{font-weight:900;font-size:16px;letter-spacing:.02em}
.top .brand span{color:var(--accent)}
.banner{border-radius:12px;padding:11px 13px;font-size:13px;margin-bottom:12px;border:1px solid}
.banner.warn{background:#2a220a;border-color:var(--warn);color:#ffd98a}
.banner.ok{background:#0b2c1f;border-color:var(--good);color:#9df3c8}
.banner.info{background:#101a33;border-color:var(--accent);color:#bcd0ff}
.big{font-size:42px;font-weight:900}
.qbox{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px;white-space:pre-wrap;
  font-size:15px;line-height:1.55}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border:none}
.stepper{display:flex;align-items:center;gap:14px;justify-content:center}
.stepper button{width:44px;height:44px;border-radius:12px;font-size:22px}
.modal{position:fixed;inset:0;background:#000a;display:flex;align-items:flex-end;justify-content:center;z-index:90}
.modal .sheet{background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:18px;
  width:100%;max-width:760px;max-height:90vh;overflow:auto}
@media(min-width:640px){.modal{align-items:center}.modal .sheet{border-radius:20px}}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #fff5;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style><style>
.seg{display:flex;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:5px;overflow-x:auto}
.seg button{flex:1;white-space:nowrap;border:none;background:transparent;color:var(--mut);font-weight:700;
  font-size:13px;padding:9px 10px;border-radius:9px;cursor:pointer}
.seg button.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.rtable{width:100%;border-collapse:collapse;font-size:13px}
.rtable th{text-align:right;color:var(--mut);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:6px 6px;border-bottom:1px solid var(--line)}
.rtable th:first-child,.rtable td:first-child{text-align:left}
.rtable td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;font-weight:700}
.rtable td.ch{color:var(--txt)} .rtable tr:last-child td{border:none}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:800}
.pill.g{background:#0b2c1f;color:var(--good)} .pill.y{background:#2a220a;color:var(--warn)} .pill.r{background:#3a0d14;color:var(--bad)}
.acct{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;background:var(--panel2)}
.acct.on{border-color:var(--accent)}
.acct .lbl{font-weight:800;font-size:14px}.acct .id{color:var(--mut);font-size:12px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--line);flex:none}.dot.on{background:var(--good)}
.metric.mt .n{color:#ffd36b}
.alert{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);margin-bottom:8px;font-size:13.5px}
.alert .ai{font-size:18px;flex:none}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth" class="hide">
  <div class="wrap" style="max-width:400px;padding-top:12vh">
    <div class="center" style="margin-bottom:18px">
      <div class="brand" style="font-size:26px;font-weight:900">Ceas<span style="color:var(--accent)">AI</span></div>
      <div class="mut" style="margin-top:6px">Outreach — sign in</div>
      <div class="mut" style="margin-top:4px;font-size:11px">build v12 · free-tier</div>
    </div>
    <div class="card">
      <form onsubmit="return doAuth(event)">
        <div class="field"><label>Email</label><input id="a-email" type="email" autocomplete="username" required/></div>
        <div class="field"><label>Password</label><input id="a-pass" type="password" autocomplete="current-password" required/></div>
        <div id="auth-msg"></div>
        <button id="a-submit" class="btn primary block lg" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hide">
  <div class="top">
    <div class="brand">Ceas<span>AI</span> Outreach</div>
    <button class="btn ghost" style="margin-left:auto;padding:8px 12px" onclick="signOut()" title="Sign out">⏻</button>
  </div>
  <div id="view" class="wrap"></div>
  <div class="nav" id="nav"></div>
</div>
<script>
/* ============ CONFIG ============ */
const SUPABASE_URL = "https://dxctcajmleurhwhbnqyj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable__u2lblfYFekZgYJknH3PtQ_J20vGVF9";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BIZ_TYPES = ["Gym","CrossFit","MMA / Boxing","Yoga / Pilates","Personal Training","Boutique Studio","Wellness / Spa","Other"];
const TEMPLATE_B = {
  subject: "quick question about {{title}}",
  body: `Hi there,

Quick question — is {{title}} currently doing anything to automatically follow up with new leads and website inquiries?

I build simple AI tools for {{city}} fitness & wellness businesses that capture every inquiry and reply (and book them) in seconds — so you stop losing prospects to slow follow-up.

Worth a quick look?`
};
// channel keys logged in email_events.channel
const CH = {
  email:{label:"Email",ic:"✉️"}, instagram_dm:{label:"Instagram",ic:"📷"},
  sms:{label:"SMS 🔒",ic:"💬",warmOnly:true,paid:true}, linkedin:{label:"LinkedIn",ic:"in"},
  call:{label:"Call",ic:"☎️"}, meeting:{label:"Meeting",ic:"📅"}, followups:{label:"Follow-ups",ic:"⏰"},
};
const OUT_CHANNELS = ["email","instagram_dm","linkedin","call"];   // FREE channels (built + wired)
const OUT_TABS = ["followups","email","instagram_dm","linkedin","call","sms"];  // sms tab = paid, not wired

/* ============ STATE ============ */
const state = {
  user:null, profile:null, org:null,
  view:"dashboard",
  contacts:[], events:[],
  metrics:{},
  segment:{type:"", state:"", hasEmail:false, warm:false, noContact:false},
  outCh:"email",
  search:"",
  editId:null,
  q:{queue:[], idx:0, text:"", _sig:""}, // shared queue for IG/LinkedIn/SMS
};

/* ============ HELPERS ============ */
const $  = (s,r=document)=>r.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(m,cls=""){let t=document.createElement("div");t.className="toast "+cls;t.textContent=m;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
function toastErr(e){toast((e&&e.message)||String(e),"err");}
function num(n){return (n||0).toLocaleString();}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function lsKey(k){return "ceasai_"+k+"_"+(state.user?state.user.id:"anon");}
function igClean(v){return String(v||"").trim().replace(/^@+/,"").replace(/^https?:\/\/(www\.)?instagram\.com\//i,"").replace(/[/?#].*$/,"");}
function tagVal(c,pre){const t=(c.tags||[]).find(x=>String(x).indexOf(pre)===0);return t?t.slice(pre.length):"";}
function bizType(c){return tagVal(c,"biz:")||"Other";}
function stOf(c){return (tagVal(c,"st:")||"").toUpperCase();}
function igOf(c){return igClean(tagVal(c,"ig:")||c.instagram||"");}
function dispName(c){return c.title||((c.first_name||"")+" "+(c.last_name||"")).trim()||"—";}
function isInbound(c){return String(c&&c.source||"").indexOf("IG keyword")===0;}
function isWarm(c){return isInbound(c)||c.status==="Replied"||c.status==="Meeting";}
function hasEmail(c){return !!(c.email&&c.email.includes("@"));}
function daysAgo(ts){if(!ts)return null;return Math.floor((Date.now()-new Date(ts).getTime())/86400000);}
/* templates + counters (client-side, no schema change) */
function tplGet(){try{const v=JSON.parse(localStorage.getItem(lsKey("tplB")));if(v&&v.subject)return v;}catch(e){}return {...TEMPLATE_B};}
function tplSet(o){try{localStorage.setItem(lsKey("tplB"),JSON.stringify(o));}catch(e){}}
/* named templates (multi-template + per-template reporting) */
function tplsGet(){try{const v=JSON.parse(localStorage.getItem(lsKey("tpls")));if(Array.isArray(v)&&v.length)return v;}catch(e){}
  return [{id:"tb",name:"Template B",subject:TEMPLATE_B.subject,body:TEMPLATE_B.body},
          {id:"tf",name:"Follow-up bump",subject:"following up — {{title}}",
           body:"Hi there,\n\nJust bumping my note in case it got buried — is {{title}} doing anything to automatically follow up with new leads?\n\nHappy to show a 2-minute example.\n\nNo worries if now's not the time."}];}
function tplsSet(a){try{localStorage.setItem(lsKey("tpls"),JSON.stringify(a));}catch(e){}}
function activeTplId(){return localStorage.getItem(lsKey("tplActive"))||"tb";}
function setActiveTpl(id){localStorage.setItem(lsKey("tplActive"),id);render();}
function activeTpl(){const a=tplsGet();return a.find(t=>t.id===activeTplId())||a[0];}
/* follow-up sequence (owner-triggered, free — no paid scheduler) */
function sentToday(){const t=new Date();t.setHours(0,0,0,0);
  return state.events.filter(e=>e.channel==="email"&&e.status==="sent"&&e.sent_at&&new Date(e.sent_at)>=t).length;}
function seqGet(){try{const v=JSON.parse(localStorage.getItem(lsKey("seq")));if(Array.isArray(v)&&v.length)return v;}catch(e){}
  return [{day:0,channel:"email"},{day:3,channel:"email"},{day:7,channel:"instagram_dm"}];}
function seqSet(a){try{localStorage.setItem(lsKey("seq"),JSON.stringify(a));}catch(e){}}
/* CSV export of the current segment */
function exportCsv(){
  const seg=segFilter(state.contacts);
  const cols=["business","email","phone","instagram","city","state","business_type","status","source"];
  const rows=seg.map(c=>[dispName(c),c.email||"",c.phone||"",igOf(c),c.city||"",stOf(c),bizType(c),c.status||"",c.source||""]);
  const csv=[cols.join(",")].concat(rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(","))).join("\n");
  const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  const a=document.createElement("a");a.href=url;a.download="ceasai-segment.csv";a.click();URL.revokeObjectURL(url);
  toast("Exported "+seg.length+" leads","ok");
}
/* accounts (multi-account rotation) */
function acctAll(){try{const v=JSON.parse(localStorage.getItem(lsKey("accts")));if(v)return v;}catch(e){}
  return {email:[],instagram:[],sms:[],linkedin:[],active:{},booking:""};}
function acctSave(o){try{localStorage.setItem(lsKey("accts"),JSON.stringify(o));}catch(e){}}
function acctList(ch){return acctAll()[ch]||[];}
function acctActive(ch){const a=acctAll();const id=a.active&&a.active[ch];return (a[ch]||[]).find(x=>x.id===id)||(a[ch]||[])[0]||null;}
function bookingUrl(){return acctAll().booking||"";}

/* ============ EVENT LOG (all channels) ============ */
async function logEvent(channel, contactId, status, extra){
  const now=new Date().toISOString();
  const row={org_id:state.org.id, contact_id:contactId||null, channel, status,
    subject:(extra&&extra.subject)||CH[channel].label, provider:(extra&&extra.provider)||"manual",
    to_email:(extra&&extra.to_email)||null, completed_by:state.user.email,
    sent_at:(status==="sent"?now:null), personalization:extra||{}};
  const {data,error}=await sb.from("email_events").insert(row).select().maybeSingle();
  if(error){toastErr(error);return null;}
  if(data)state.events.unshift(data);
  computeMetrics();
  return data;
}

/* ============ AUTH ============ */
async function doAuth(ev){
  ev.preventDefault();
  const email=$("#a-email").value.trim(), pass=$("#a-pass").value;
  const btn=$("#a-submit");btn.disabled=true;const o=btn.textContent;btn.textContent="Please wait…";
  const msg=$("#auth-msg");msg.innerHTML="";
  try{const {error}=await sb.auth.signInWithPassword({email,password:pass});if(error)throw error;await boot();}
  catch(e){msg.innerHTML='<div class="banner warn">'+esc(e.message||"Sign-in failed")+'</div>';btn.disabled=false;btn.textContent=o;}
  return false;
}
async function signOut(){await sb.auth.signOut();location.reload();}
sb.auth.onAuthStateChange((e)=>{if(e==="SIGNED_OUT")location.reload();});

/* ============ BOOT / DATA ============ */
async function boot(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user){$("#auth").classList.remove("hide");$("#app").classList.add("hide");return;}
  state.user=user;
  let {data:prof}=await sb.from("profiles").select("*").eq("id",user.id).maybeSingle();
  if(!prof){await new Promise(r=>setTimeout(r,900));({data:prof}=await sb.from("profiles").select("*").eq("id",user.id).maybeSingle());}
  state.profile=prof||{email:user.email,org_id:null};
  if(state.profile.org_id){const {data:org}=await sb.from("orgs").select("*").eq("id",state.profile.org_id).maybeSingle();state.org=org;}
  $("#auth").classList.add("hide");$("#app").classList.remove("hide");
  await loadAll();
  checkAlerts();
  navigate(state.view);
}
async function loadAll(){
  let all=[], from=0; const page=1000;
  for(let g=0;g<40;g++){
    const {data,error}=await sb.from("contacts").select("*").order("updated_at",{ascending:false}).range(from,from+page-1);
    if(error){toastErr(error);break;}
    all=all.concat(data||[]);
    if(!data||data.length<page)break; from+=page;
  }
  state.contacts=all;
  const {data:ev}=await sb.from("email_events").select("*").order("created_at",{ascending:false}).limit(5000);
  state.events=ev||[];
  computeMetrics();
}
function computeMetrics(){
  const sentBy={}, repBy={}; let meetings=0;
  OUT_CHANNELS.forEach(c=>{sentBy[c]=0;repBy[c]=0;});
  state.events.forEach(e=>{
    if(e.channel==="meeting"){meetings++;return;}
    if(!(e.channel in sentBy))return;
    if(e.status==="sent")sentBy[e.channel]++;
    else if(e.status==="replied")repBy[e.channel]++;
  });
  const inbound=state.contacts.filter(isInbound).length;
  const totalRep=OUT_CHANNELS.reduce((a,c)=>a+repBy[c],0);
  state.metrics={sentBy,repBy,meetings,inbound,
    emails:sentBy.email, dms:sentBy.instagram_dm,
    responses:totalRep+inbound};
}

/* ============ NAV ============ */
const TABS=[
  {id:"dashboard",ic:"📊",label:"Home"},
  {id:"leads",ic:"🎯",label:"Leads"},
  {id:"outreach",ic:"🚀",label:"Outreach"},
  {id:"accounts",ic:"👤",label:"Accounts"},
  {id:"settings",ic:"⚙️",label:"Settings"},
];
function navigate(v){state.view=v;renderNav();render();window.scrollTo(0,0);}
function renderNav(){$("#nav").innerHTML=TABS.map(t=>`<button class="${state.view===t.id?'on':''}" onclick="navigate('${t.id}')"><span class="ic">${t.ic}</span>${t.label}</button>`).join("");}
function render(){
  const v=$("#view");
  const map={dashboard:viewDashboard,leads:viewLeads,outreach:viewOutreach,accounts:viewAccounts,settings:viewSettings};
  v.innerHTML=(map[state.view]||viewDashboard)();
}

/* ============ SEGMENT ============ */
function segFilter(list){const s=state.segment;const q=(state.search||"").toLowerCase().trim();
  return list.filter(c=>{
  if(q && !((dispName(c)+" "+(c.city||"")+" "+(c.email||"")).toLowerCase().includes(q)))return false;
  if(s.type && bizType(c)!==s.type)return false;
  if(s.state && stOf(c)!==s.state.toUpperCase())return false;
  if(s.hasEmail && !hasEmail(c))return false;
  if(s.warm && !isWarm(c))return false;
  if(s.noContact && (hasEmail(c)||igOf(c)))return false;
  return true;});}
function emailable(list){return list.filter(c=>hasEmail(c)&&!c.unsubscribed&&c.email_status!=="bounced"&&c.email_status!=="invalid");}
function withIG(list){return list.filter(c=>igOf(c));}
function segLabel(){const s=state.segment;const p=[];if(s.warm)p.push("Warm");if(s.noContact)p.push("Needs contact info");p.push(s.type||"All types");if(s.state)p.push(s.state.toUpperCase());if(s.hasEmail)p.push("has email");return p.join(" · ");}
function statesList(){return [...new Set(state.contacts.map(stOf).filter(Boolean))].sort();}
function setSeg(k,v){state.segment[k]=v;render();}
function toggleSeg(k){state.segment[k]=!state.segment[k];render();}
function viewWarm(){state.segment={type:"",state:"",hasEmail:false,warm:true};navigate("leads");}

/* ============ NOTIFICATIONS ============ */
function enableNotifs(){if(!("Notification"in window)){toast("Notifications not supported","err");return;}
  Notification.requestPermission().then(p=>{toast(p==="granted"?"Desktop notifications on":"Notifications blocked",p==="granted"?"ok":"err");render();});}
function checkAlerts(){
  try{
    const inbound=state.contacts.filter(isInbound).length;
    const seen=parseInt(localStorage.getItem(lsKey("inboundSeen"))||"0");
    if(inbound>seen && "Notification"in window && Notification.permission==="granted"){
      new Notification("CeasAI Outreach",{body:(inbound-seen)+" new warm inbound lead(s) from Instagram."});
    }
    localStorage.setItem(lsKey("inboundSeen"),String(inbound));
  }catch(e){}
}
function sentFor(id){return state.events.filter(e=>e.contact_id===id&&e.status==="sent"&&e.channel!=="meeting");}
function seqState(c){
  if(c.unsubscribed||["Replied","Meeting","Won","Lost"].includes(c.status))return null;
  const seq=seqGet();const sent=sentFor(c.id);const idx=sent.length;
  if(idx===0)return null;                       // not started — that's cold outreach, not a follow-up
  if(idx>=seq.length)return {done:true};        // sequence complete
  const gap=(seq[idx].day||0)-(seq[idx-1].day||0);
  const last=sent[0]&&sent[0].sent_at?sent[0].sent_at:c.last_contacted_at;
  const d=daysAgo(last);
  return {idx,step:seq[idx],due:(d!=null&&d>=gap),days:d};
}
function dueList(){const out=[];for(const c of state.contacts){const s=seqState(c);if(s&&!s.done&&s.due)out.push({c,step:s.step,idx:s.idx});}return out;}
function followupsDue(){return dueList().map(x=>x.c);}

function reportCard(){
  const m=state.metrics;
  const rows=OUT_CHANNELS.map(ch=>{
    const s=m.sentBy[ch]||0, r=m.repBy[ch]||0, rate=pct(r,s);
    const cls=s===0?"":rate>=15?"g":rate>=5?"y":"r";
    return `<tr><td class="ch">${CH[ch].ic} ${CH[ch].label}</td><td>${num(s)}</td><td>${num(r)}</td>
      <td>${s?`<span class="pill ${cls}">${rate}%</span>`:'<span class="mut">—</span>'}</td></tr>`;
  }).join("");
  // best segment by replies (attribute replies to lead's biz type)
  const segRep={};
  state.events.forEach(e=>{if(e.status!=="replied"||!e.contact_id)return;const c=state.contacts.find(x=>x.id===e.contact_id);if(!c)return;const t=bizType(c);segRep[t]=(segRep[t]||0)+1;});
  const top=Object.entries(segRep).sort((a,b)=>b[1]-a[1]).slice(0,3);
  return `<div class="card">
    <div style="font-weight:800;margin-bottom:4px">What's working</div>
    <div class="mut" style="font-size:12px;margin-bottom:10px">Sent, replies &amp; reply-rate by channel. Log replies as they land so this stays true.</div>
    <table class="rtable"><thead><tr><th>Channel</th><th>Sent</th><th>Replies</th><th>Reply %</th></tr></thead><tbody>${rows}</tbody></table>
    ${top.length?`<div class="mut" style="font-size:12.5px;margin-top:10px">Top replying segments: ${top.map(([t,n])=>esc(t)+" ("+n+")").join(" · ")}</div>`:""}
    ${tplReport()}
    <button class="btn ghost block" style="margin-top:10px" onclick="quickReply()">+ Log a reply</button>
  </div>`;
}
function tplReport(){
  const bySubj={};
  state.events.forEach(e=>{if(e.status!=="sent"||e.channel==="meeting")return;const k=e.subject||"(no subject)";
    bySubj[k]=bySubj[k]||{sent:0,rep:0};bySubj[k].sent++;});
  state.events.forEach(e=>{if(e.status!=="replied")return;
    let k=e.personalization&&e.personalization.subject;
    if(!k&&e.contact_id){const last=state.events.find(x=>x.contact_id===e.contact_id&&x.status==="sent");k=last&&last.subject;}
    if(!k)return;if(bySubj[k])bySubj[k].rep++;});
  const rows=Object.entries(bySubj).sort((a,b)=>b[1].sent-a[1].sent).slice(0,5);
  if(!rows.length)return "";
  return `<div style="font-weight:800;margin:14px 0 6px;font-size:13px">By message</div>
  <table class="rtable"><thead><tr><th>Message</th><th>Sent</th><th>Replies</th><th>Reply %</th></tr></thead><tbody>
  ${rows.map(([k,v])=>`<tr><td class="ch">${esc(k.length>34?k.slice(0,34)+"…":k)}</td><td>${num(v.sent)}</td><td>${num(v.rep)}</td>
    <td>${v.sent?`<span class="pill ${v.rep/v.sent>=0.15?"g":v.rep/v.sent>=0.05?"y":"r"}">${pct(v.rep,v.sent)}%</span>`:"—"}</td></tr>`).join("")}
  </tbody></table>`;
}
function quickReply(){
  const opts=OUT_CHANNELS.map(ch=>`<button class="btn block" style="margin-bottom:8px" onclick="logReplyCh('${ch}',this)">${CH[ch].ic} Reply via ${CH[ch].label}</button>`).join("");

    <div class="h1">Log a reply</div><div class="sub">Which channel did the reply come through?</div>${opts}
    <button class="btn ghost block" onclick="this.closest('.modal').remove()">Cancel</button></div></div>`);
}

function leadCard(c){
  const tags=[];
  if(isInbound(c))tags.push('<span class="tag" style="color:var(--good)">🔥 inbound</span>');
  else if(c.status==="Replied")tags.push('<span class="tag" style="color:var(--good)">↩ replied</span>');
  if(hasEmail(c))tags.push('<span class="tag em">✉ email</span>');
  const ig=igOf(c);if(ig)tags.push('<span class="tag ig">📷 @'+esc(ig)+'</span>');
  tags.push('<span class="tag">'+esc(bizType(c))+'</span>');
  return `<div class="lead" style="cursor:pointer" onclick="editLead('${c.id}')"><div class="nm">${esc(dispName(c))}</div>
    <div class="meta">${esc([c.city,stOf(c)].filter(Boolean).join(", "))||"—"}</div><div>${tags.join("")}</div></div>`;

async function importLeads(btn){
  if(!state.org){toast("Org not ready","err");return;}
  if(state.contacts.some(c=>c.source==="mindbody")){toast("Already imported","ok");return;}
  btn.disabled=true;const o=btn.innerHTML;btn.innerHTML='<span class="spin"></span> Importing…';
  try{
    const seed=await fetch("leads-seed.json",{cache:"no-store"}).then(r=>r.json());
    const org_id=state.org.id;let done=0;
    for(let i=0;i<seed.length;i+=200){
      const batch=seed.slice(i,i+200).map(s=>{const tags=["biz:"+(s.business_type||"Other")];
        if(s.state)tags.push("st:"+String(s.state).toUpperCase());if(s.instagram)tags.push("ig:"+igClean(s.instagram));
        return {org_id,first_name:"",last_name:"",title:s.company||null,email:s.email||null,city:s.city||null,
          tags,source:"mindbody",status:"New",notes:s.website?("web: "+s.website):null};});
      const {error}=await sb.from("contacts").insert(batch);if(error)throw error;
      done+=batch.length;btn.innerHTML='<span class="spin"></span> '+done+" / "+seed.length;
    }
    toast("Imported "+done+" leads","ok");await loadAll();render();
  }catch(e){toastErr(e);btn.disabled=false;btn.innerHTML=o;}
}

function research(id,kind){
  const c=state.contacts.find(x=>x.id===id);if(!c)return;
  const q=encodeURIComponent(dispName(c)+" "+(c.city||"")+" "+(stOf(c)||""));
  let url;
  if(kind==="ig")url="https://www.google.com/search?q="+q+"+site:instagram.com";
  else if(kind==="site"){
    const m=/https?:\/\/\S+/.exec(c.notes||"");
    url=m?m[0]:"https://www.google.com/search?q="+q+"+official+site";
  } else url="https://www.google.com/search?q="+q+"+email+contact";
  window.open(url,"_blank");
}
async function saveLead(btn){
  const id=state.editId;const c=state.contacts.find(x=>x.id===id);if(!c)return;
  btn.disabled=true;btn.textContent="Saving…";
  const ig=igClean($("#ed-ig").value);
  const st=($("#ed-state").value||"").toUpperCase().slice(0,2);
  const type=$("#ed-type").value;
  const tags=(c.tags||[]).filter(t=>!/^(biz:|st:|ig:)/.test(t));
  tags.push("biz:"+type); if(st)tags.push("st:"+st); if(ig)tags.push("ig:"+ig);
  const patch={title:$("#ed-title").value.trim()||null,email:$("#ed-email").value.trim()||null,
    phone:$("#ed-phone").value.trim()||null,city:$("#ed-city").value.trim()||null,
    status:$("#ed-status").value,notes:$("#ed-notes").value.trim()||null,tags,
    updated_at:new Date().toISOString()};
  const {error}=await sb.from("contacts").update(patch).eq("id",id);
  if(error){toastErr(error);btn.disabled=false;btn.textContent="Save";return;}
  Object.assign(c,patch);
  computeMetrics();toast("Saved","ok");
  const md=btn.closest(".modal");if(md)md.remove();render();
}
async function leadReplied(id,btn){
  btn.disabled=true;

}

function mergeMail(t,c){const map={title:dispName(c),business:dispName(c),company:dispName(c),city:c.city||"your area",
  first_name:c.first_name||"there",first:c.first_name||"there",booking:bookingUrl()||"(booking link)"};
  return String(t||"").replace(/\{\{?\s*(\w+)\s*\}?\}/g,(m,k)=>map[k]!=null?map[k]:m);}
function saveTpl(){const a=tplsGet();const t=a.find(x=>x.id===activeTplId())||a[0];t.subject=$("#e-subj").value;t.body=$("#e-body").value;tplsSet(a);}
function resetTpl(){const a=tplsGet();const t=a.find(x=>x.id===activeTplId())||a[0];t.subject=TEMPLATE_B.subject;t.body=TEMPLATE_B.body;tplsSet(a);render();}
function insertBooking(id){const b=bookingUrl();if(!b){toast("Add a booking link in Accounts","err");return;}
  const el=$("#"+id);el.value=el.value.replace(/\s*$/,"")+"\n\nBook a quick call: "+b;if(id==="e-body")saveTpl();}
function confirmSend(){
  const send=emailable(segFilter(state.contacts));if(!send.length)return;
  document.body.insertAdjacentHTML("beforeend",`<div class="modal" onclick="if(event.target===this)this.remove()"><div class="sheet">
    <div class="h1">Send to ${num(send.length)} businesses?</div><div class="sub">${esc(segLabel())} · via your Gmail SMTP engine</div>
    <div class="banner info">Personalized, paced, capped at ${num((state.org&&state.org.daily_cap)||100)}/day, every send logged. Unsubscribed skipped.</div>
    <button class="btn primary block lg" onclick="doSend(this)">Yes — send now</button>
    <button class="btn ghost block" style="margin-top:8px" onclick="this.closest('.modal').remove()">Cancel</button></div></div>`);

async function sentCount(){try{const r=await sb.from("email_events").select("id",{count:"exact",head:true}).eq("channel","email").eq("status","sent");return r.count||0;}catch(e){return null;}}
async function doSend(btn){
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Sending…';
  const tpl=activeTpl();const send=emailable(segFilter(state.contacts));const ids=send.map(c=>c.id);
  const acct=acctActive("email");
  if(acct&&acct.from_email&&acct.from_email!==state.org.from_email){
    try{await sb.from("orgs").update({from_email:acct.from_email,reply_to:acct.reply_to||null}).eq("id",state.org.id);state.org.from_email=acct.from_email;}catch(e){}
  }
  const before=await sentCount();let campId=null;
  try{const {data:camp}=await sb.from("campaigns").insert({org_id:state.org.id,name:"Mass email — "+segLabel(),subject:tpl.subject,body:tpl.body,status:"queued",total:ids.length,daily_cap:(state.org.daily_cap||100)}).select().maybeSingle();campId=camp?camp.id:null;}catch(e){}
  let data=null,invokeErr=null;
  try{const r=await sb.functions.invoke("send-campaign",{body:{campaign_id:campId,contact_ids:ids,subject:tpl.subject,body:tpl.body}});data=r.data;invokeErr=r.error||null;}catch(e){invokeErr=e;}
  await new Promise(r=>setTimeout(r,900));
  const after=await sentCount();
  const delta=(before!=null&&after!=null)?Math.max(0,after-before):null;
  const sent=(data&&typeof data.sent==="number")?data.sent:(delta!=null?delta:0);
  const md=btn.closest(".modal");if(md)md.remove();
  if(data&&data.reason==="no_provider"){toast("SMTP not configured in Supabase secrets","err");}
  else if(data&&data.reason==="no_address"){toast("Add a mailing address in Settings","err");navigate("settings");return;}
  else if(sent>0){toast("Sent "+num(sent)+(data&&data.capped_over_daily_limit?" · "+data.capped_over_daily_limit+" held for tomorrow":""),"ok");}
  else if(invokeErr||(data&&data.reason==="smtp_connect_failed")){toast("Send didn't go through — check SMTP secrets/port 465","err");}
  else{toast("Nothing sent (no eligible recipients)","err");}
  await loadAll();navigate("dashboard");
}

/* ---- FOLLOW-UPS panel (sequence automation, owner-triggered = free) ---- */
function panelFollowups(){
  const due=dueList();
  const seq=seqGet();
  const byCh={};due.forEach(d=>{const ch=d.step.channel;(byCh[ch]=byCh[ch]||[]).push(d.c);});
  const emailDue=(byCh.email||[]).filter(c=>hasEmail(c)&&!c.unsubscribed);
  const seqLine=seq.map((s,i)=>`Day ${s.day} → ${CH[s.channel]?CH[s.channel].label:s.channel}`).join("  ·  ");
  const groups=Object.keys(byCh).map(ch=>{
    const list=byCh[ch];
    const act=ch==="email"
      ? `<button class="btn primary block" ${emailDue.length?"":"disabled"} onclick="sendFollowupEmail(this)">✉️ Send follow-up to ${num(emailDue.length)} due</button>`
      : `<button class="btn primary block" onclick="loadDueQueue('${ch}')">${CH[ch]?CH[ch].ic:""} Work ${num(list.length)} in the ${CH[ch]?CH[ch].label:ch} queue</button>`;
    return `<div class="card">
      <div style="font-weight:800;margin-bottom:8px">${CH[ch]?CH[ch].ic+" "+CH[ch].label:ch} · ${num(list.length)} due</div>
      ${list.slice(0,5).map(c=>`<div class="lead" style="cursor:pointer" onclick="editLead('${c.id}')"><div class="nm">${esc(dispName(c))}</div>
        <div class="meta">${esc(bizType(c))} · last touch ${num(daysAgo(c.last_contacted_at))}d ago</div></div>`).join("")}
      ${list.length>5?`<div class="mut" style="font-size:12px;margin-bottom:8px">+ ${num(list.length-5)} more</div>`:""}
      ${act}</div>`;
  }).join("");
  return `<div class="banner info">⏰ <b>Follow-up sequence:</b> ${esc(seqLine)}. Leads that already got a first touch and haven't replied surface here when the next step is due. You press send — nothing goes out on its own (that's what keeps it free and safe). Edit the sequence in Settings.</div>
  ${due.length?groups:`<div class="card center"><div style="font-size:38px">✅</div><div style="font-weight:800;margin-top:6px">Nothing due</div>
    <div class="mut">No follow-ups are due right now. Send a first touch from the Email or Instagram tabs to start the sequence.</div></div>`}`;
}
function loadDueQueue(ch){
  const ids=dueList().filter(d=>d.step.channel===ch).map(d=>d.c.id);
  state.outCh=ch;state.q.queue=ids;state.q.idx=0;state.q.text="";state.q._sig="due|"+ch+"|"+ids.length;
  render();toast("Loaded "+ids.length+" due into the queue","ok");
}
async function sendFollowupEmail(btn){
  const due=dueList().filter(d=>d.step.channel==="email").map(d=>d.c).filter(c=>hasEmail(c)&&!c.unsubscribed);
  if(!due.length)return;
  const tpls=tplsGet();const fu=tpls.find(t=>/follow/i.test(t.name))||tpls[1]||tpls[0];
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Sending…';
  const before=await sentCount();
  let campId=null;
  try{const {data:camp}=await sb.from("campaigns").insert({org_id:state.org.id,name:"Follow-up — "+fu.name,subject:fu.subject,body:fu.body,status:"queued",total:due.length,daily_cap:(state.org.daily_cap||100)}).select().maybeSingle();campId=camp?camp.id:null;}catch(e){}
  let data=null,err=null;
  try{const r=await sb.functions.invoke("send-campaign",{body:{campaign_id:campId,contact_ids:due.map(c=>c.id),subject:fu.subject,body:fu.body}});data=r.data;err=r.error||null;}catch(e){err=e;}
  await new Promise(r=>setTimeout(r,900));
  const after=await sentCount();
  const sent=(data&&typeof data.sent==="number")?data.sent:Math.max(0,(after||0)-(before||0));
  if(sent>0)toast("Follow-up sent to "+num(sent),"ok");
  else toast("Follow-up didn't send — check SMTP","err");
  await loadAll();render();
}

function typeWord(t){return ({"Gym":"gym","CrossFit":"CrossFit box","MMA / Boxing":"gym","Yoga / Pilates":"studio","Personal Training":"training studio","Boutique Studio":"studio","Wellness / Spa":"wellness business","Other":"business"})[t]||"business";}
function genMsg(c,ch){
  const biz=dispName(c)==="—"?"your studio":dispName(c);
  const ctx={biz,city:c.city||"your area",type:typeWord(bizType(c))};
  const book=bookingUrl();
  let parts;
  if(ch==="linkedin"){
    parts=[pick(["Hi — I came across {biz} and wanted to connect.","Hi! Loved what {biz} is doing and had to reach out."]),
      pick(["I build simple AI tools for {type}s that capture every lead and follow up + book clients automatically.","I help {type}s stop losing leads — one simple app that replies and books in seconds."]),
      pick(["Open to a quick look?","Worth a short chat?","Mind if I share a 2-min example?"])];
  }else if(ch==="sms"){
    parts=[pick(["Hey! Following up from {biz} —","Hi — thanks for reaching out to {biz}!","Hey, great connecting re: {biz}."]),
      pick(["I build simple AI that books more clients for {type}s.","quick AI tool that follows up + books your leads automatically."]),
      pick(["Want the 2-min version?","Cool if I send an example?","Good time for a quick call?"])];
  }else{ // instagram_dm
    parts=[pick(["Hey there!","Hi 👋","Hey — hope you're good!"]),
      pick(["love what you're doing at {biz}.","came across {biz} and had to reach out.","found {biz} while looking at {type}s in {city}."]),
      pick(["I build simple AI tools for {type}s that capture every lead and follow up (and book them) automatically.","one simple app that replies to leads in seconds + books them for you."]),
      pick(["Cool if I send a quick example?","Open to a 2-min look?","Want me to show what it could do for {biz}?"])];
  }
  let msg=parts.map(p=>String(p).replace(/\{(\w+)\}/g,(m,k)=>ctx[k]!=null?ctx[k]:m)).join(" ").replace(/\s{2,}/g," ").trim();
  if(book && ch!=="sms")msg+=" "+book;
  return msg;
}

  ${chBlock("email",`<input id="ac-email-label" placeholder="Label (e.g. Main)"/><input id="ac-email-addr" placeholder="from email"/>`)}
  ${chBlock("instagram",`<input id="ac-instagram-label" placeholder="Label"/><input id="ac-instagram-handle" placeholder="@handle"/>`)}
  ${chBlock("linkedin",`<input id="ac-linkedin-label" placeholder="Label"/><input id="ac-linkedin-profile" placeholder="profile URL"/>`)}
  ${chBlock("sms",`<input id="ac-sms-label" placeholder="Label"/><input id="ac-sms-number" placeholder="+1..."/>`)}
  <div class="card">
    <div style="font-weight:800;margin-bottom:6px">📅 Booking link</div>
    <div class="mut" style="font-size:12.5px;margin-bottom:10px">Your Calendly / Cal.com URL. Drop it into any message with “Insert booking link”. Meetings are your conversion goal — log them from Outreach.</div>
    <div class="field" style="margin:0"><input id="ac-booking" value="${esc(a.booking||"")}" placeholder="https://cal.com/your-name/intro"/></div>
    <button class="btn primary block" style="margin-top:10px" onclick="saveBooking()">Save booking link</button>
  </div>`;
}
function addAcct(ch){
  const a=acctAll();const g=id=>{const el=$("#ac-"+ch+"-"+id);return el?el.value.trim():"";};
  const label=g("label")||CH[ch==="instagram"?"instagram_dm":ch].label;
  const obj={id:"a"+Date.now().toString(36),label};
  if(ch==="email"){obj.from_email=g("addr");if(!obj.from_email){toast("Enter a from email","err");return;}}
  if(ch==="instagram"){obj.handle=igClean(g("handle"));if(!obj.handle){toast("Enter a handle","err");return;}}
  if(ch==="linkedin"){obj.profile=g("profile");}
  if(ch==="sms"){obj.number=g("number");if(!obj.number){toast("Enter a number","err");return;}}
  a[ch]=a[ch]||[];a[ch].push(obj);a.active=a.active||{};if(!a.active[ch])a.active[ch]=obj.id;acctSave(a);toast("Account added","ok");render();
}
function setActive(ch,id){const a=acctAll();a.active=a.active||{};a.active[ch]=id;acctSave(a);toast("Active account set","ok");render();}
function delAcct(ch,id){const a=acctAll();a[ch]=(a[ch]||[]).filter(x=>x.id!==id);if(a.active&&a.active[ch]===id)delete a.active[ch];acctSave(a);render();}
function saveBooking(){const a=acctAll();a.booking=$("#ac-booking").value.trim();acctSave(a);toast("Booking link saved","ok");}

/* ============ SETTINGS ============ */
function viewSettings(){
  const o=state.org||{};const notifOn=("Notification"in window)&&Notification.permission==="granted";
  return `<div class="h1">Settings</div><div class="sub">Sending identity &amp; compliance</div>
  <div class="card">
    <div class="field"><label>From name</label><input id="s-fromname" value="${esc(o.from_name||"CeasAI")}"/></div>
    <div class="field"><label>Default from email</label><input id="s-fromemail" value="${esc(o.from_email||"ceasai.pro@gmail.com")}"/></div>
    <div class="field"><label>Reply-to (optional)</label><input id="s-replyto" value="${esc(o.reply_to||"")}"/></div>
    <div class="field"><label>Mailing address (required by law on every email)</label><input id="s-addr" value="${esc(o.mailing_address||"CeasAI - Metro Atlanta GA 30092")}"/></div>
    <div class="field"><label>Daily send cap</label><input id="s-cap" type="number" value="${esc(o.daily_cap||100)}"/></div>
    <button class="btn primary block" onclick="saveSettings(this)">Save settings</button>
  </div>
  <div class="card"><div style="font-weight:800;margin-bottom:6px">Notifications</div>
    <div class="mut" style="font-size:13px;margin-bottom:10px">Desktop alerts for new warm leads &amp; replies while the app is open. ${notifOn?"<b style='color:var(--good)'>On.</b>":""}</div>
    ${notifOn?"":`<button class="btn block" onclick="enableNotifs()">🔔 Enable desktop notifications</button>`}
  </div>
  <div class="card"><div style="font-weight:800;margin-bottom:6px">Email engine</div>
    <div class="mut" style="font-size:13px">Sends run through the Supabase <b>send-campaign</b> edge function using Gmail SMTP. Credentials live only as Supabase secrets. Footer + unsubscribe auto-appended (CAN-SPAM).</div></div>
  <div class="card">
    <div style="font-weight:800;margin-bottom:6px">⏰ Follow-up sequence</div>
    <div class="mut" style="font-size:12.5px;margin-bottom:10px">After a first touch, leads surface in the <b>Follow-ups</b> queue when the next step is due. You press send — nothing fires automatically (an auto-sender needs a paid scheduler; this stays free and ban-safe).</div>
    ${seqGet().map((st,i)=>`<div class="row" style="margin-bottom:8px;align-items:center">
      <div class="field" style="margin:0;max-width:90px"><input type="number" min="0" value="${st.day}" onchange="seqEdit(${i},'day',this.value)"/></div>
      <div class="field" style="margin:0"><select onchange="seqEdit(${i},'channel',this.value)">
        ${OUT_CHANNELS.map(c=>`<option value="${c}" ${st.channel===c?"selected":""}>${CH[c].label}</option>`).join("")}</select></div>
      <button class="btn ghost" style="flex:none;max-width:44px;color:var(--bad)" onclick="seqDel(${i})">✕</button></div>`).join("")}
    <button class="btn block" onclick="seqAdd()">+ Add step</button>
  </div>
  <div class="card">
    <div style="font-weight:800;margin-bottom:6px">📝 Message templates</div>
    <div class="mut" style="font-size:12.5px;margin-bottom:10px">Reporting breaks replies down by message, so you can see which one actually works.</div>
    ${tplsGet().map(t=>`<div class="acct"><span class="dot ${t.id===activeTplId()?"on":""}"></span>
      <div style="flex:1"><div class="lbl">${esc(t.name)}</div><div class="id">${esc(t.subject)}</div></div>
      <button class="btn ghost" style="padding:6px 10px;flex:none" onclick="setActiveTpl('${t.id}')">${t.id===activeTplId()?"Active":"Use"}</button>
      ${tplsGet().length>1?`<button class="btn ghost" style="padding:6px 9px;flex:none;color:var(--bad)" onclick="tplDel('${t.id}')">✕</button>`:""}</div>`).join("")}
    <div class="field" style="margin-top:6px"><input id="tpl-new" placeholder="New template name"/></div>
    <button class="btn block" onclick="tplAdd()">+ Add template</button>
  </div>
  <div class="card"><div style="font-weight:800;margin-bottom:6px">💵 What this costs</div>
    <table class="rtable"><thead><tr><th>Piece</th><th>Cost</th></tr></thead><tbody>
      <tr><td class="ch">Supabase (DB + functions)</td><td><span class="pill g">Free</span></td></tr>
      <tr><td class="ch">Vercel hosting</td><td><span class="pill g">Free</span></td></tr>
      <tr><td class="ch">Gmail SMTP email</td><td><span class="pill g">Free</span></td></tr>
      <tr><td class="ch">Instagram + LinkedIn queues</td><td><span class="pill g">Free</span></td></tr>
      <tr><td class="ch">Call logging, reporting, alerts</td><td><span class="pill g">Free</span></td></tr>
      <tr><td class="ch">Calendly / Cal.com booking</td><td><span class="pill g">Free tier</span></td></tr>
      <tr><td class="ch">ManyChat (fires IG auto-replies)</td><td><span class="pill y">Free 25 contacts · $14–29/mo</span></td></tr>
      <tr><td class="ch">SMS (Twilio)</td><td><span class="pill r">Not built · ~$5–15/mo+</span></td></tr>
      <tr><td class="ch">WhatsApp Business API</td><td><span class="pill r">Not built · per-conversation</span></td></tr>
    </tbody></table>
    <div class="mut" style="font-size:12px;margin-top:8px">Everything running today is $0. Nothing in this app requires a paid service.</div>
  </div>
  <div class="card"><div style="font-weight:800;margin-bottom:6px">Data</div>
    <div class="mut" style="font-size:13px;margin-bottom:10px">${num(state.contacts.length)} leads · ${num(state.contacts.filter(c=>c.source==="mindbody").length)} Mindbody · ${num(state.metrics.inbound)} warm inbound.</div>
    <button class="btn block" onclick="navigate('leads')">Manage leads &amp; segments →</button></div>
  <button class="btn ghost block" style="border-color:var(--bad);color:var(--bad)" onclick="signOut()">Sign out</button>`;
}
async function saveSettings(btn){
  btn.disabled=true;const o=btn.textContent;btn.textContent="Saving…";
  const patch={from_name:$("#s-fromname").value.trim()||null,from_email:$("#s-fromemail").value.trim()||null,
    reply_to:$("#s-replyto").value.trim()||null,mailing_address:$("#s-addr").value.trim()||null,
    daily_cap:parseInt($("#s-cap").value)||100,email_provider:"smtp"};
  const {error}=await sb.from("orgs").update(patch).eq("id",state.org.id);
  if(error){toastErr(error);btn.disabled=false;btn.textContent=o;return;}
  Object.assign(state.org,patch);toast("Saved","ok");btn.disabled=false;btn.textContent=o;
}

function seqEdit(i,k,v){const a=seqGet();a[i][k]=(k==="day")?(parseInt(v)||0):v;a.sort((x,y)=>x.day-y.day);seqSet(a);render();}
function seqDel(i){const a=seqGet();if(a.length<=1){toast("Keep at least one step","err");return;}a.splice(i,1);seqSet(a);render();}
function seqAdd(){const a=seqGet();a.push({day:(a[a.length-1].day||0)+3,channel:"email"});seqSet(a);render();toast("Step added","ok");}
function tplAdd(){const n=$("#tpl-new").value.trim();if(!n){toast("Name it first","err");return;}
  const a=tplsGet();a.push({id:"t"+Date.now().toString(36),name:n,subject:TEMPLATE_B.subject,body:TEMPLATE_B.body});tplsSet(a);toast("Template added","ok");render();}
function tplDel(id){const a=tplsGet().filter(t=>t.id!==id);tplsSet(a);if(activeTplId()===id)setActiveTpl(a[0].id);else render();}

/* ============ START ============ */
boot();
</script>
</body>
